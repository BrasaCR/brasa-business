<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BRASA Business — Human Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://images.brasa.world">
<link rel="preconnect" href="https://assets.brasa.world">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Geist:wght@300..700&display=swap" rel="stylesheet">
<style>
:root{
  --brasa-black:#1B1A17; --brasa-soft:#6B6862; --brasa-accent:#8C3A1F; --brasa-green:#0D6E5C;
  --brasa-callout:#F2EDE0; --brasa-page:#FBF9F4; --brasa-cream:#F5F0E5; --brasa-rule:#E5DFD0; --brasa-hover:#6B280F;
  --serif:'Fraunces','Times New Roman',serif; --sans:'Geist','Helvetica Neue',system-ui,sans-serif;
  --max-w:1480px; --gutter:clamp(1.25rem,4vw,2.75rem);
  --ease:cubic-bezier(.22,.61,.36,1); --ease-out:cubic-bezier(.16,1,.3,1);
  --bg:var(--brasa-page); --bg-deep:var(--brasa-callout); --ink:var(--brasa-black);
  --ink-soft:var(--brasa-soft); --ink-faint:#A19E97; --ink-mute:var(--brasa-soft);
  --paper:var(--brasa-cream); --line:rgba(27,26,23,.12); --line-strong:rgba(27,26,23,.22); --accent:var(--brasa-accent);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
.container{width:100%;max-width:var(--max-w);margin:0 auto;padding-left:var(--gutter);padding-right:var(--gutter)}

.site-header{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;
  padding:.85rem var(--gutter);background:rgba(251,249,244,.92);backdrop-filter:blur(8px);border-bottom:.5px solid var(--line)}
.wordmark{display:flex;align-items:center;cursor:pointer}
.wordmark-img{height:50px;width:auto}
.nav{display:flex;gap:1.9rem;align-items:center}
.nav a{font-size:.8rem;font-weight:500;letter-spacing:.04em;color:var(--ink-soft);position:relative;padding:.2rem 0;transition:color .3s var(--ease);cursor:pointer}
.nav a:hover,.nav a.active{color:var(--ink)}
.nav a::after{content:'';position:absolute;bottom:-2px;left:0;height:1px;width:0;background:currentColor;transition:width .36s var(--ease)}
.nav a:hover::after,.nav a.active::after{width:100%}

main{padding-bottom:3rem;min-height:60vh}
.page{padding-top:clamp(2rem,5vh,3.4rem)}
.eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:500;margin-bottom:16px}
.cat-title{font-family:var(--serif);font-size:clamp(40px,7vw,58px);font-weight:400;letter-spacing:-.025em;line-height:1;margin-bottom:10px}
.cat-line{font-size:14px;color:var(--ink-soft);margin-bottom:30px;letter-spacing:.005em}
.lede{font-family:var(--serif);font-size:clamp(20px,3vw,27px);font-weight:300;line-height:1.32;letter-spacing:-.01em;color:var(--ink);max-width:36ch;margin-bottom:8px}

.vertical{margin-bottom:54px}
.vertical:last-of-type{margin-bottom:72px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.tile{position:relative;aspect-ratio:4/3;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#ECE6D8;border:.5px solid rgba(27,26,23,.06);cursor:pointer;transition:background .25s var(--ease),transform .25s var(--ease)}
.tile:hover{background:#E4DCC9;transform:translateY(-2px)}
.tile .tl{font-family:var(--serif);font-size:23px;font-weight:400;color:var(--ink);letter-spacing:-.015em;text-align:center;padding:0 14px;line-height:1.2}
.tile .sub{position:absolute;bottom:11px;left:0;right:0;text-align:center;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint)}

.back-link{display:inline-block;font-size:14px;color:var(--ink-mute);margin:6px 0 20px;cursor:pointer;transition:color .18s,transform .18s}
.back-link:hover{color:var(--ink);transform:translateX(-3px)}
.cat-hero{position:relative;aspect-ratio:16/6;background:#ECE6D8;display:flex;align-items:center;justify-content:center;margin-bottom:26px;overflow:hidden}
.cat-hero .h{font-family:var(--serif);font-size:clamp(40px,9vw,90px);font-weight:300;color:#D8CFBC;letter-spacing:-.03em}

.rows{border-top:.5px solid var(--line)}
.line{display:flex;align-items:center;gap:1rem;padding:14px 0;border-bottom:.5px solid var(--line)}
.line .dish-thumb{flex:0 0 auto;width:56px;height:56px;border-radius:7px;object-fit:cover;background:#ECE6D8;border:.5px solid rgba(27,26,23,.06)}
.dtile{position:relative;aspect-ratio:4/3;border-radius:6px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;background:#ECE6D8;border:.5px solid rgba(27,26,23,.06);cursor:pointer;text-decoration:none;transition:transform .22s var(--ease),box-shadow .22s var(--ease)}
.dtile:hover{transform:translateY(-2px);box-shadow:0 18px 36px -24px rgba(20,16,12,.55)}
.dtile-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.dtile.has-photo::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(18,14,10,.92),rgba(18,14,10,.3) 56%,rgba(18,14,10,0));z-index:1}
.dtile .dt-in{position:relative;z-index:2;padding:13px 14px}
.dtile .dt-nm{font-family:var(--serif);font-size:18px;font-weight:400;line-height:1.16;letter-spacing:-.01em;color:var(--ink)}
.dtile.has-photo .dt-nm{color:#FBF9F4}
.dtile .dt-pr{font-size:12px;letter-spacing:.02em;margin-top:5px;color:var(--ink-soft)}
.dtile.has-photo .dt-pr{color:rgba(245,240,229,.86)}
.dtile .dt-add,.dtile .dt-86{position:absolute;top:9px;right:9px;z-index:3;height:24px;min-width:24px;padding:0 7px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:13px;line-height:1}
.dtile .dt-add{background:var(--brasa-accent);color:#fff}
.dtile .dt-86{background:rgba(140,58,31,.16);color:var(--brasa-accent);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.dtile .pill.green{margin-left:5px;vertical-align:middle}
.dtile .dt-toggle{position:absolute;top:9px;left:9px;z-index:4;height:22px;padding:0 9px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(251,249,244,.94);color:var(--brasa-accent);border:1px solid rgba(140,58,31,.45);opacity:1;cursor:pointer}
.dtile .dt-toggle:hover{background:var(--brasa-accent);color:#fff}
.dtile .dt-compose{position:absolute;bottom:9px;right:9px;z-index:4;height:24px;padding:0 10px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:.02em;background:var(--brasa-accent);color:#fff;cursor:pointer;box-shadow:0 4px 12px -4px rgba(20,16,12,.5)}
.dtile .dt-compose:hover{filter:brightness(1.08)}
.dtile .dt-special{position:absolute;top:9px;left:9px;z-index:4;height:22px;padding:0 9px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--brasa-accent);color:#fff;box-shadow:0 4px 12px -5px rgba(20,16,12,.5)}
.ar-search{display:flex;gap:8px;margin:6px 0 4px}
.ar-search input{flex:1;min-width:0;padding:11px 14px;border:1px solid #E5DFD0;border-radius:8px;font:inherit;background:#fff;color:#1B1A17}
.ar-search input:focus{outline:none;border-color:var(--brasa-accent)}
.ar-search .btn{white-space:nowrap;margin:0}
#composeBar{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:60;display:flex;gap:14px;align-items:center;background:#1B1A17;color:#FBF9F4;padding:9px 10px 9px 18px;border-radius:30px;box-shadow:0 16px 40px -16px rgba(0,0,0,.55);font-size:13px}
#composeBar .btn{margin:0}
.line .m{flex:1;min-width:0}
.line .nm{font-weight:500}
.line .meta{font-size:13px;color:var(--ink-soft);margin-top:2px}
.line .v{font-family:var(--serif);font-size:18px;white-space:nowrap;text-align:right}
.pill{font-size:11px;letter-spacing:.03em;padding:2px 9px;border:.5px solid var(--line-strong);border-radius:999px;color:var(--ink-soft);white-space:nowrap}
.pill.accent{color:var(--accent);border-color:rgba(140,58,31,.45)}
.pill.green{color:var(--brasa-green);border-color:rgba(13,110,92,.45)}

.stats{display:flex;gap:2.6rem;flex-wrap:wrap;margin:6px 0 30px}
.stat .n{font-family:var(--serif);font-size:42px;font-weight:300;letter-spacing:-.02em;line-height:1}
.stat .l{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-top:6px}

.split{display:flex;justify-content:space-between;align-items:baseline;padding:12px 0;border-bottom:.5px solid var(--line);font-size:15px;color:var(--ink-soft)}
.split b{color:var(--ink);font-weight:500}
.split.grand{border-bottom:none;padding-top:16px}
.split.grand .a{font-family:var(--serif);font-size:30px;font-weight:400;color:var(--ink);letter-spacing:-.02em}

.note{font-size:14px;color:var(--ink-soft);line-height:1.65;max-width:62ch;margin-top:6px}
.pull-quote{font-family:var(--serif);font-size:clamp(20px,3.4vw,26px);font-style:italic;font-weight:300;text-align:center;
  padding:34px 0;border-top:.5px solid var(--line);border-bottom:.5px solid var(--line);margin:32px 0;letter-spacing:-.01em;line-height:1.35}
.section{margin-bottom:36px}
.section-h{font-family:var(--serif);font-size:22px;font-weight:400;letter-spacing:-.015em;margin-bottom:6px}
.section-sub{font-size:13px;color:var(--ink-soft);margin-bottom:14px}

.banner{background:var(--brasa-callout);border:.5px solid var(--line);padding:18px 20px;margin-bottom:26px}
.banner .bt{font-family:var(--serif);font-size:18px;margin-bottom:4px}
.banner .bs{font-size:13.5px;color:var(--ink-soft);line-height:1.55}
.banner .br{display:flex;justify-content:space-between;align-items:baseline;margin-top:10px;padding-top:10px;border-top:.5px solid var(--line)}
.banner .br .a{font-family:var(--serif);font-size:24px}
.miss{font-size:13px;color:var(--accent);margin-top:8px}

.kv{display:flex;justify-content:space-between;gap:1rem;padding:9px 0;border-bottom:.5px solid var(--line);font-size:14px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--ink-soft)} .kv .v{font-family:var(--serif);text-align:right} .kv .v.mono{font-family:var(--sans);font-size:13px;color:var(--ink-soft)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;font-family:var(--sans);font-size:13.5px;font-weight:500;
  padding:9px 16px;border-radius:2px;border:.5px solid var(--line-strong);background:transparent;color:var(--ink);cursor:pointer;transition:.18s}
.btn:hover{border-color:var(--ink)}
.btn.solid{background:var(--accent);color:#fff;border-color:var(--accent)} .btn.solid:hover{background:var(--brasa-hover);border-color:var(--brasa-hover)}
.btn.green{background:var(--brasa-green);color:#fff;border-color:var(--brasa-green)} .btn.green:hover{background:#0a5848}
.btn.sm{padding:7px 12px;font-size:13px}
.btn:disabled{opacity:.38;cursor:not-allowed;border-color:var(--line-strong);background:transparent;color:var(--ink-faint)}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

.scrim{position:fixed;inset:0;background:rgba(27,26,23,.5);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;z-index:100}
.scrim.show{display:flex;animation:fade .2s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{background:var(--bg);width:100%;max-width:580px;border-radius:14px 14px 0 0;padding:26px var(--gutter) 30px;max-height:92vh;overflow-y:auto;box-shadow:0 -20px 60px rgba(27,26,23,.18)}
@media(min-width:600px){.scrim{align-items:center}.sheet{border-radius:14px}}
.sheet h3{font-family:var(--serif);font-size:30px;font-weight:400;letter-spacing:-.02em;margin-bottom:4px}
.sheet .sub{font-size:13px;color:var(--ink-soft);margin-bottom:22px}
.field{margin-bottom:15px}
.field label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px}
.field input,.field select{width:100%;padding:11px 12px;border:.5px solid var(--line-strong);border-radius:2px;background:#fff;font-size:15px;font-family:var(--sans);color:var(--ink);outline:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.doc{border:.5px solid var(--line);background:#fff;padding:20px}
.doc .dh{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:3px}
.doc .dt{font-family:var(--serif);font-size:21px;margin-bottom:2px}
.doc .dm{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px}
.doc table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
.doc th{text-align:left;font-weight:500;color:var(--ink-faint);border-bottom:.5px solid var(--line);padding:6px 8px 6px 0;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase}
.doc td{padding:7px 8px 7px 0;border-bottom:.5px solid var(--line)}
.doc td.r,.doc th.r{text-align:right}
.doc .tot td{border-bottom:none;font-weight:600;border-top:1px solid var(--line-strong)}

.qrwrap{display:flex;justify-content:center;margin:8px 0 16px}
.qrwrap canvas{width:200px;height:200px;image-rendering:pixelated;border:.5px solid var(--line);background:#fff;border-radius:4px}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--brasa-black);color:var(--brasa-cream);
  padding:11px 20px;border-radius:3px;font-size:14px;opacity:0;pointer-events:none;transition:.25s var(--ease-out);z-index:300}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

footer{border-top:.5px solid var(--line);padding:30px var(--gutter);display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem;
  font-size:12.5px;color:var(--ink-soft);letter-spacing:.02em}
footer .b{font-family:var(--serif)}

@media(max-width:900px){ .wordmark-img{height:46px} .nav{gap:1.25rem} }
@media(max-width:560px){
  .grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .tile .tl{font-size:18px} .tile .sub{font-size:9px} .ptile .tl{font-size:17px}
  .nav a:not(.nav-home){display:none}
  .wordmark-img{height:40px}
  .stats{gap:1.6rem} .stat .n{font-size:34px}
  .doc{padding:14px} .doc table{font-size:12px}
}

.hero{position:relative;overflow:hidden;min-height:clamp(400px,58vh,560px);display:flex;align-items:flex-end;background:#16110e center/cover no-repeat}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(18,14,10,.5) 0%,rgba(18,14,10,0) 20%,rgba(18,14,10,0) 50%,rgba(18,14,10,.88) 100%);z-index:1}
.hero-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.hero-in{position:relative;z-index:2;width:100%;max-width:var(--max-w);margin:0 auto;padding:0 var(--gutter) clamp(32px,4vw,56px)}
.hero .back-link{display:inline-block;color:rgba(245,240,229,.8);margin-bottom:14px;text-shadow:0 1px 8px rgba(0,0,0,.4)}
.hero .back-link:hover{color:#FBF9F4}
.hero .eyebrow{color:rgba(245,240,229,.74);margin-bottom:14px}
.hero .cat-title{color:#FBF9F4;font-size:clamp(44px,8.4vw,76px);margin-bottom:12px;text-shadow:0 2px 30px rgba(0,0,0,.35)}
.hero .cat-line{color:rgba(245,240,229,.9)}
.hero .lede{color:rgba(245,240,229,.82);max-width:34ch}
.ptile{position:relative;display:flex;align-items:flex-end;aspect-ratio:4/3;border-radius:6px;overflow:hidden;background:#211c17;box-shadow:0 16px 36px -22px rgba(20,16,12,.5);text-decoration:none;transition:transform .18s ease,box-shadow .18s ease}
.ptile:hover{transform:translateY(-3px);box-shadow:0 24px 48px -22px rgba(20,16,12,.6)}
.ptile-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.ptile::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(12,9,6,.30) 0%,rgba(12,9,6,0) 42%);z-index:1}
.ptile .pt-in{position:relative;z-index:2;padding:16px 16px 15px;width:100%}
.ptile .tl{display:block;font-family:var(--serif);font-size:21px;font-weight:400;letter-spacing:-.012em;color:#fff;line-height:1.08;overflow-wrap:break-word;hyphens:auto;text-shadow:0 1px 3px rgba(0,0,0,.9),0 2px 16px rgba(0,0,0,.6)}
.ptile .sub{display:block;font-size:11px;letter-spacing:.03em;color:#fff;margin-top:6px;text-shadow:0 1px 3px rgba(0,0,0,.85),0 2px 12px rgba(0,0,0,.55)}
/* hero-mode: nav floats transparent over the hero, turns solid on scroll (brasa.world style) */
body.hero-mode .site-header{position:fixed;left:0;right:0;top:0;background:rgba(251,249,244,0);backdrop-filter:none;-webkit-backdrop-filter:none;border-bottom-color:transparent;transition:background .35s var(--ease),border-color .35s var(--ease)}
body.hero-mode .nav a{color:rgba(245,240,229,.86);text-shadow:0 1px 10px rgba(0,0,0,.45)}
body.hero-mode .nav a:hover,body.hero-mode .nav a.active{color:#FBF9F4}
body.hero-mode .wordmark-img{filter:drop-shadow(0 2px 10px rgba(0,0,0,.6))}
body.hero-mode.scrolled .site-header{background:rgba(251,249,244,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom-color:var(--line)}
body.hero-mode.scrolled .nav a{color:var(--ink-soft);text-shadow:none}
body.hero-mode.scrolled .nav a:hover,body.hero-mode.scrolled .nav a.active{color:var(--ink)}
body.hero-mode.scrolled .wordmark-img{filter:none}
</style>
</head>
<body>

<header class="site-header">
  <a class="wordmark" data-route="" aria-label="BRASA CR — Business">
    <img class="wordmark-img" src="https://assets.brasa.world/Photos/brasa-cr-logo_8.png" alt="BRASA CR"
         onerror="this.outerHTML='&lt;span style=&quot;font-family:var(--serif);font-weight:800;font-size:1.4rem&quot;&gt;BRASA &lt;b style=&quot;color:var(--accent)&quot;&gt;CR&lt;/b&gt;&lt;/span&gt;'">
  </a>
  <nav class="nav" aria-label="Primary">
    <a href="https://brasa.education/">Education</a>
    <a href="https://brasagovernment.net/">Government</a>
    <a class="active nav-home" data-route="">Business</a>
    <a href="https://brasa.world/">BRASA</a>
  </nav>
</header>

<main><div id="view"></div></main>

<footer>
  <span class="b">BRASA CR™ · brasa.world</span>
  <span>The owner has the system. BRASA is the pipe.</span>
</footer>

<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
<div id="toast"></div>

<script>
const $=s=>document.getElementById(s);
const fmt=n=>'₡'+Math.round(n).toLocaleString('en-US');
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(m){ const t=$('toast'); t.textContent=m; t.className='show'; clearTimeout(window._tt); window._tt=setTimeout(()=>t.className='',2800); }
function openSheet(html){ $('sheet').innerHTML=html; $('scrim').classList.add('show'); }
function closeSheet(){ $('scrim').classList.remove('show'); }
$('scrim').addEventListener('click',e=>{ if(e.target===$('scrim'))closeSheet(); });
const QR=(function(){
  const EXP=new Array(512),LOG=new Array(256);let x=1;for(let i=0;i<255;i++){EXP[i]=x;LOG[x]=i;x<<=1;if(x&0x100)x^=0x11d;}for(let i=255;i<512;i++)EXP[i]=EXP[i-255];
  const mul=(a,b)=>(a===0||b===0)?0:EXP[LOG[a]+LOG[b]];
  function genPoly(n){let g=[1];for(let i=0;i<n;i++){const ng=new Array(g.length+1).fill(0);for(let j=0;j<g.length;j++){ng[j]^=mul(g[j],EXP[i]);ng[j+1]^=g[j];}g=ng;}return g;}

   ============================================================================ */
const subs=b=>D[b].team.filter(t=>t.role!=='owner');
const period=()=>new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'});
const paidJobs=b=>D[b].jobs.filter(j=>j.paid);
/* HR is HR — the same Costa Rica labor engine the restaurant uses. The owner sets the
   wage (their arrangement); BRASA computes the statutory charges, renta, and accruals. */
const monthsSince=ts=>(Date.now()-(ts||Date.now()))/(30.44*DAY);
const monthlyWage=w=>w.wageType==='hourly'?(w.wage*CFG.workweekHours*4.33):(w.wage||0);
const rentaMonthly=g=>{ let tax=0,prev=0; for(const [cap,rate] of CFG.rentaBrackets){ const amt=Math.min(g,cap)-prev; if(amt>0)tax+=amt*rate; prev=cap; if(g<=cap)break; } return tax; };
const vacAccrued=w=>monthsSince(w.hired)*(CFG.vacDaysPerYear/12);
const vacBalance=w=>Math.max(0,vacAccrued(w)-(w.vacTaken||0));
function aguinaldoAccrued(w){ const n=new Date(); let dec=new Date(n.getFullYear(),11,1); if(n<dec)dec=new Date(n.getFullYear()-1,11,1);
  const m=Math.min(12,Math.min((Date.now()-dec.getTime())/(30.44*DAY),monthsSince(w.hired))); return monthlyWage(w)*(m/12); }
function planilla(b){ return subs(b).map(w=>{ const base=monthlyWage(w); if(!(base>0))return null;
  const employee=base*CFG.ccssEmployee, renta=rentaMonthly(base), net=base-employee-renta;
  const employer=base*CFG.ccssEmployer, premium=base*CFG.insWC, agui=base*CFG.aguinaldoRate, vac=base*VAC_FRACTION, cost=base+employer+premium+agui+vac;
  return { w, base, employee, renta, net, employer, premium, agui, vac, cost }; }).filter(Boolean); }
function hrIssues(b){ const out=[]; subs(b).forEach(w=>{ const mw=monthlyWage(w);
  if(!w.cedula)out.push([w.n,'Missing ID']);
  if(!w.niss)out.push([w.n,'Missing CCSS social no. — blocks SICERE']);
  if(!w.fechaNac)out.push([w.n,'Missing birth date — blocks INS']);
  if(mw>0 && mw<CFG.minWageMonthly)out.push([w.n,'Wage below reference minimum']); }); return out; }
const revenue=b=>paidJobs(b).reduce((a,j)=>a+j.fee,0);
function ivaSummary(b){ const R=D[b].remittance; const collected=R.reduce((a,r)=>a+r.iva,0); return { collected, calculated:collected, transmitted:R.filter(r=>r.status==='transmitted').reduce((a,r)=>a+r.iva,0), count:R.length }; }
const vatOf=b=>ivaSummary(b).collected;
/* remitToHacienda — split VAT off a paid sale, book it to the remittance ledger,
   hand it to the factura-electronica rail. The business never owns it. */
function remit(b,j){ const iva=j.fee-j.fee/(1+CFG.vat), base=j.fee-iva, ref='IVA-'+(j.n||0)+'-'+Date.now().toString(36).toUpperCase().slice(-5);
  j._iva=iva; j.remitRef=ref; j.remitStatus='pending';
  D[b].remittance.push({ n:j.n, ts:j.ts, cliente:j.cliente, base, iva, rate:CFG.vat, cedula:D[b].patrono.cedula, status:'pending', ref }); return iva; }
function ready(b,e){ const p=D[b].patrono, L=planilla(b), miss=[];
  if(e==='ccss'){ if(!p.patronalCCSS)miss.push('CCSS employer number'); L.forEach(x=>{ if(!x.w.niss)miss.push('social no. for '+x.w.n.split(' ')[0]); if(!x.w.cedula)miss.push('ID for '+x.w.n.split(' ')[0]); }); }
  if(e==='hacienda'){ if(!p.cedula)miss.push('Tax ID (ATV)'); if(!p.ciiu)miss.push('CIIU activity'); }
  if(e==='ins'){ if(!p.polizaINS)miss.push('INS policy (WC)'); L.forEach(x=>{ if(!x.w.cedula)miss.push('ID for '+x.w.n.split(' ')[0]); if(!x.w.fechaNac)miss.push('birth date for '+x.w.n.split(' ')[0]); }); }
  if(e==='renta'){ if(!p.cedula)miss.push('Tax ID (ATV)'); L.forEach(x=>{ if(!x.w.cedula)miss.push('ID for '+x.w.n.split(' ')[0]); }); }
  return { ok:miss.length===0, miss:[...new Set(miss)] }; }

  const ref='BRASA-'+Date.now().toString(36).toUpperCase(); const payload='SINPE|'+D[b].biz+'|'+Math.round(j.fee)+'|CRC|'+ref;

/* ============================================================================
   PRODUCT REGISTRY + BARCODE RESOLUTION
   Set REGISTRY_API to your R2/Worker base (barcode -> JSON) and LOOKUP_API to a
   commercial-lookup proxy. Empty = offline mode using the seed registry below.
   ============================================================================ */
const REGISTRY_API='https://brasa-registry.richard-bad.workers.dev/';
const LOOKUP_API='https://brasa-registry.richard-bad.workers.dev/lookup/';
const REG={};  // no goods boards on this surface yet
async function resolveBarcode(code){
  code=(code||'').replace(/\D/g,''); if(!code) return null;
  // prefer the LIVE registry (has images) over the local seed/cache
  if(REGISTRY_API){ try{ const r=await fetch(REGISTRY_API+code); if(r.ok){ const d=await r.json(); if(d){ REG[code]=d; return Object.assign({barcode:code},d); } } }catch(e){} }
  if(REG[code]) return Object.assign({barcode:code},REG[code]);
  if(LOOKUP_API){ try{ const r=await fetch(LOOKUP_API+code); if(r.ok){ const d=await r.json(); if(d){ REG[code]=d; return Object.assign({barcode:code},d); } } }catch(e){} }
  return null;
}
function addByBarcode(b,kind){ openSheet(`<h3>Add product \u00B7 ${esc(KIND[kind].op)}</h3><div class="sub">Scan or enter the barcode \u2014 we fill the rest</div>
  <div class="field"><label>Barcode (UPC / EAN)</label><input id="bcIn" inputmode="numeric" placeholder="7441001234567"></div>
  <div class="btnrow" style="margin:0 0 12px"><button class="btn" onclick="lookupInto('${kind}')">Look up</button></div>
  <div id="bcPrevWrap" style="display:none;margin:0 0 12px"><img id="bcPrev" alt="" style="max-width:130px;max-height:130px;object-fit:contain;border-radius:10px;background:#fff;border:1px solid #e5ddd0;padding:4px"></div>
  <input id="bcImg" type="hidden">
  <div class="field"><label>Product name</label><input id="bcN" placeholder="resolves from barcode\u2026"></div>
  <div class="field"><label>Brand (optional)</label><input id="bcB"></div>
  <div class="field"><label>Price (CRC)</label><input id="bcP" inputmode="numeric" placeholder="0"></div>
  <div class="field"><label>On hand</label><input id="bcQ" inputmode="numeric" placeholder="0"></div>
  <div class="btnrow"><button class="btn solid" onclick="addStockCommit('${b}','${kind}')">Add to stock</button><button class="btn" onclick="closeSheet()">Cancel</button></div>`); }
async function lookupInto(kind){ const hit=await resolveBarcode($('bcIn').value);
  if(hit){ $('bcN').value=hit.n||''; $('bcB').value=hit.brand||''; $('bcImg').value=hit.img||'';
    if(hit.img){ $('bcPrev').src=hit.img; $('bcPrevWrap').style.display='block'; } else { $('bcPrevWrap').style.display='none'; }
    toast('Found: '+(hit.n||'')); }
  else { $('bcPrevWrap').style.display='none'; toast('Not in registry \u2014 enter details, it is saved for everyone'); } }
function addStockCommit(b,kind){ const n=$('bcN').value.trim(); if(!n){toast('Name is required');return;}
  const code=($('bcIn').value||'').replace(/\D/g,''); const br=$('bcB').value.trim();
  const p=Math.max(0,parseFloat($('bcP').value)||0), q=Math.max(0,parseInt($('bcQ').value)||0);
  const img=$('bcImg').value||null;
  if(code&&!REG[code]) REG[code]={n,brand:br,cat:kind,img};
  (CATALOG[kind]=CATALOG[kind]||[]).push({s:code||('BRZ-'+Date.now()),n,p,q,r:Math.max(1,Math.ceil(q/4)),img});

    <div class="kv"><span class="k">INS policy (WC)</span><span class="v mono">${esc(p.polizaINS||'missing')}</span></div>
    <div class="kv"><span class="k">CIIU activity</span><span class="v mono">${esc(p.ciiu||'missing')} · ${esc(p.ciiuName)}</span></div></div>
  <div class="section"><div class="line" style="border-bottom:none;padding-bottom:4px"><div class="m"><div class="section-h">Hacienda — Electronic tiquete</div><div class="section-sub" style="margin-bottom:0">Tiquete Electrónico v4.4 · composed per sale</div></div><span class="pill accent">Por firmar</span></div>
    <div class="kv"><span class="k">VAT on composed tiquetes</span><span class="v">${fmt(iva.calculated)}</span></div>
    <div class="kv"><span class="k">Tiquetes composed</span><span class="v">${d.comprobantes.length}</span></div>
    <div class="kv"><span class="k">VAT rate</span><span class="v">13%</span></div>
    <p class="note" style="margin-top:8px">On each SINPE sale BRASA composes a Tiquete Electrónico v4.4 as the business, with the 13% VAT split off (the State's money — BRASA never holds it). Sealing with the business's BCCR key and transmission to Hacienda (TRIBU-CR) are the backend step and are not yet done — so these are composed, not yet legally issued.</p>
    ${d.comprobantes.length?`<div class="rows">${d.comprobantes.slice(-6).reverse().map(c=>`<div class="line" style="cursor:pointer" onclick="openComprobante('${b}','${c.clave}')"><div class="m"><div class="nm">Tiquete ${c.consec.slice(-10).replace(/^0+/,'')}</div><div class="meta mono">${c.clave.slice(0,21)}… · IVA ${fmt(c.totalImpuesto)}</div></div><span class="pill ${c.estado==='aceptado'?'green':'accent'}">${c.estado==='aceptado'?'aceptado (sim)':'pending signature'}</span></div>`).join('')}</div>`:''}
    <div class="btnrow"><button class="btn sm" onclick="viewDoc('${b}','hacienda')">View tiquetes</button></div></div>
  ${railRow(b,'ccss','CCSS — SICERE','Monthly payroll',[['Workers on payroll', L.length],['Base wages', fmt(tB)],['Employee contribution', fmt(tE)],['Employer contribution', fmt(tEm)]])}
  ${railRow(b,'ins','INS — RT-Virtual',"Workers' Compensation",[['Insured workers', L.length],['Reference premium', fmt(tPr)]])}
  ${railRow(b,'renta','Hacienda — Renta (Serie 100)','Income tax withheld on salaries',[['Workers on payroll', L.length],['Income tax withheld', fmt(L.reduce((a,x)=>a+x.renta,0))]])}
  <div class="section"><div class="section-h">What makes this a legal business</div>
    <div class="rows">
      <div class="line"><div class="m"><div class="nm">Electronic tiquete composed on every sale</div><div class="meta">Tiquete Electrónico v4.4 · per job</div></div><span class="pill green">Active</span></div>
      <div class="line"><div class="m"><div class="nm">Sealed &amp; transmitted to Hacienda</div><div class="meta">BCCR key + TRIBU-CR · backend</div></div><span class="pill accent">Pending</span></div>
      <div class="line"><div class="m"><div class="nm">Social security payroll</div><div class="meta">CCSS · SICERE</div></div><span class="pill ${ready(b,'ccss').ok?'green':'accent'}">${ready(b,'ccss').ok?'Active':'Needs data'}</span></div>
      <div class="line"><div class="m"><div class="nm">Workers' Compensation</div><div class="meta">INS · RT-Virtual</div></div><span class="pill ${ready(b,'ins').ok?'green':'accent'}">${ready(b,'ins').ok?'Active':'Needs data'}</span></div>
      <div class="line"><div class="m"><div class="nm">Employer identity registered</div><div class="meta">Tax ID · CCSS · INS · CIIU</div></div><span class="pill ${ready(b,'hacienda').ok?'green':'accent'}">${ready(b,'hacienda').ok?'Active':'Needs data'}</span></div>
    </div>
    <p class="note">Income tax (renta) and the municipal business license file on the same official portals — BRASA prepares the figures and links you out. Rates are standard Costa Rica values and configurable. The tiquete that reports VAT is composed automatically; sealing + transmission to Hacienda are pending; payroll filings you submit on the portal.</p></div>
  ${d.filings.length?`<div class="section"><div class="section-h">Payroll filings</div><div class="rows">${d.filings.slice().reverse().map(f=>`<div class="line"><div class="m"><div class="nm">${esc(f.label)}</div><div class="meta">${f.period} · ${esc(f.comprobante)}</div></div><span class="pill ${f.status==='filed'?'green':''}">${f.status==='filed'?'Filed':'Prepared'}</span></div>`).join('')}</div></div>`:''}`; }

/* ---- Main Office: Dashboard + Invoicing ---- */
function pDash(b){ const d=D[b], P=paidJobs(b), open=d.jobs.filter(j=>!j.paid).length;
  const net=P.reduce((a,j)=>a+(j.fee/(1+CFG.vat)),0), iva=ivaSummary(b);
  const L=planilla(b), cost=L.reduce((a,x)=>a+x.cost,0), issues=hrIssues(b);
  const rdy=['ccss','hacienda','ins'].filter(e=>ready(b,e).ok).length;
  const porFirmar=d.comprobantes.filter(c=>c.estado!=='aceptado').length;
  return head(b,'Dashboard',`${d.label} · the whole business in one view.`)+
  `<div class="stats">
     <div class="stat"><div class="n">${open}</div><div class="l">Open jobs</div></div>
     <div class="stat"><div class="n">${fmt(net)}</div><div class="l">Net · period</div></div>
     <div class="stat"><div class="n">${d.comprobantes.length}</div><div class="l">Tiquetes</div></div>
     <div class="stat"><div class="n">${rdy}/3</div><div class="l">Desks ready</div></div>
   </div>
   <div class="section"><div class="section-h">Money</div>
     <div class="kv"><span class="k">Net to your account · period</span><span class="v">${fmt(net)}</span></div>
     <div class="kv"><span class="k">VAT on composed tiquetes · reporting pending</span><span class="v">${fmt(iva.calculated)}</span></div>
     <div class="kv"><span class="k">Payroll loaded cost · month</span><span class="v">${fmt(cost)}</span></div></div>
   <div class="section"><div class="section-h">Needs attention</div><div class="rows">
     ${open?`<div class="line" style="cursor:pointer" onclick="location.hash='#${b}-food'"><div class="m"><div class="nm">${open} job(s) to complete or collect</div><div class="meta">Operations</div></div><span class="pill accent">go</span></div>`:''}
     ${porFirmar?`<div class="line" style="cursor:pointer" onclick="location.hash='#${b}-facturas'"><div class="m"><div class="nm">${porFirmar} tiquete(s) pending signature</div><div class="meta">Invoicing · sealing + transmission pending</div></div><span class="pill accent">review</span></div>`:''}
     ${issues.length?`<div class="line" style="cursor:pointer" onclick="location.hash='#${b}-equipo'"><div class="m"><div class="nm">${issues.length} HR item(s)</div><div class="meta">Team</div></div><span class="pill accent">fix</span></div>`:''}
     ${(!open&&!porFirmar&&!issues.length)?'<div class="line"><div class="meta">✓ All clear</div></div>':''}
   </div></div>`; }

function pFacturas(b){ const d=D[b], list=d.comprobantes, iva=list.reduce((a,c)=>a+c.totalImpuesto,0), acc=list.filter(c=>c.estado==='aceptado').length;
  return head(b,'Invoicing',`Every SINPE job composes a Tiquete Electrónico v4.4 — BRASA composes it as the business and reports the VAT. It never touches the money.`)+
  `<div class="stats"><div class="stat"><div class="n">${list.length}</div><div class="l">Tiquetes</div></div><div class="stat"><div class="n">${acc}</div><div class="l">Aceptados (sim)</div></div><div class="stat"><div class="n">${list.length-acc}</div><div class="l">Por firmar</div></div><div class="stat"><div class="n">${fmt(iva)}</div><div class="l">IVA</div></div></div>
   <p class="note" style="margin:8px 0 16px">Each tiquete is shown exactly as structured for Hacienda v4.4 — tap to view, including the XML. Sealing with the business's BCCR credential and transmission to TRIBU-CR run in the backend: these are composed, not yet legally issued.</p>
   ${list.length?`<div class="rows">${list.slice().reverse().map(c=>`<div class="line" style="cursor:pointer" onclick="openComprobante('${b}','${c.clave}')"><div class="m"><div class="nm">Tiquete ${c.consec.slice(-10).replace(/^0+/,'')} · ${fmt(c.totalComprobante)} ${c.estado==='aceptado'?`<span class="pill green" style="margin-left:6px">aceptado (sim)</span>`:'<span class="pill accent" style="margin-left:6px">pending signature</span>'}</div><div class="meta mono">${c.clave.slice(0,21)}… · IVA ${fmt(c.totalImpuesto)} · ${esc(c.cliente||'')}</div></div><span class="v">›</span></div>`).join('')}</div>`:`<p class="note">No tiquetes yet. Collect a job by SINPE and the first one appears here.</p>`}`; }

/* ---- Front of House: Checkout + Feedback ---- */
function pCheckout(b){ const d=D[b], toCollect=d.jobs.filter(j=>collectable(j)), open=d.jobs.filter(j=>!j.paid&&!collectable(j));
  return head(b,'Checkout',`Collect by SINPE Móvil — money straight to your account; a Tiquete Electrónico v4.4 is composed on payment.`)+
  `<div class="section"><div class="section-h">Ready to collect</div>
   <div class="rows">${toCollect.length?toCollect.map(j=>`<div class="line"><div class="m"><div class="nm">${esc(j.label)}</div><div class="meta">${ST[j.status]} · ${fmt(j.fee)}</div></div><button class="btn solid sm" onclick="collect('${b}','${j.id}')">Collect ${fmt(j.fee)}</button></div>`).join(''):'<div class="line"><div class="meta">Nothing to collect right now</div></div>'}</div></div>
   ${open.length?`<div class="section"><div class="section-h">In progress</div><div class="rows">${open.map(j=>`<div class="line"><div class="m"><div class="nm">${esc(j.label)}</div><div class="meta">${ST[j.status]}</div></div><span class="pill ${stPill(j.status)}">${ST[j.status]}</span></div>`).join('')}</div></div>`:''}
   <p class="note">On payment: SINPE to your account · 13% VAT split off · Tiquete v4.4 composed (sealing + transmission pending).</p>`; }

function pFeedback(b){ const d=D[b], fb=d.feedback||[]; const avg=fb.length?(fb.reduce((a,f)=>a+f.stars,0)/fb.length):0;
  return head(b,'Feedback',`What your customers say. The relationship is yours — so is the feedback.`)+
  `<div class="stats"><div class="stat"><div class="n">${avg.toFixed(1)}</div><div class="l">Average</div></div><div class="stat"><div class="n">${fb.length}</div><div class="l">Reviews</div></div></div>
   <div class="rows">${fb.length?fb.map(f=>`<div class="line"><div class="m"><div class="nm">${esc(f.n)} · <span style="color:var(--brasa-green)">${'★'.repeat(f.stars)}${'☆'.repeat(5-f.stars)}</span></div><div class="meta">${esc(f.note)}</div></div></div>`).join(''):'<div class="line"><div class="meta">No feedback yet</div></div>'}</div>`; }

/* ---- Per-store Checkout + Feedback (each tile is its own store) ---- */
function boardCheckout(b,jobs){ const toC=jobs.filter(j=>collectable(j)), tot=toC.reduce((a,j)=>a+j.fee,0);
  return `<div class="section"><div class="section-h">Checkout · this store</div>
   <div class="rows">${toC.length?toC.map(j=>`<div class="line"><div class="m"><div class="nm">${esc(j.label)}</div><div class="meta">${ST[j.status]} · ${fmt(j.fee)}</div></div><button class="btn solid sm" onclick="collect('${b}','${j.id}')">Collect ${fmt(j.fee)}</button></div>`).join(''):'<div class="line"><div class="meta">Nothing to collect right now</div></div>'}</div>
   ${toC.length?`<p class="note">Total ready: ${fmt(tot)} · SINPE to your account · 13% VAT split off · Tiquete v4.4 composed.</p>`:'<p class="note">Charge from the menu above — it lands here to collect by SINPE.</p>'}</div>`; }
function boardFeedback(b,kind){ const fb=(D[b].feedback||[]).filter(f=>f.kind===kind); const avg=fb.length?(fb.reduce((a,f)=>a+f.stars,0)/fb.length):0;
  return `<div class="section"><div class="section-h">Feedback · this store</div>
   <div class="btnrow" style="margin:0 0 14px"><button class="btn sm" onclick="addFeedbackForm('${b}','${kind}')">+ Add feedback</button></div>
   <div class="stats"><div class="stat"><div class="n">${fb.length?avg.toFixed(1):'—'}</div><div class="l">Average</div></div><div class="stat"><div class="n">${fb.length}</div><div class="l">Reviews</div></div></div>
   <div class="rows">${fb.length?fb.map(f=>`<div class="line"><div class="m"><div class="nm">${esc(f.n)} · <span style="color:var(--brasa-green)">${'★'.repeat(f.stars)}${'☆'.repeat(5-f.stars)}</span></div><div class="meta">${esc(f.note)}</div></div></div>`).join(''):'<div class="line"><div class="meta">No feedback yet</div></div>'}</div></div>`; }
function addFeedbackForm(b,kind){ openSheet(`<h3>Add feedback · ${esc(KIND[kind].op)}</h3><div class="sub">A note from a customer of this store</div>
  <div class="field"><label>Customer name</label><input id="fbN" placeholder="e.g. Ana Rojas"></div>
  <div class="field"><label>Stars (1-5)</label><input id="fbS" inputmode="numeric" placeholder="5"></div>
  <div class="field"><label>Note</label><input id="fbT" placeholder="What did they say?"></div>
  <div class="btnrow"><button class="btn solid" onclick="addFeedbackCommit('${b}','${kind}')">Save</button><button class="btn" onclick="closeSheet()">Cancel</button></div>`); }
function addFeedbackCommit(b,kind){ const n=$('fbN').value.trim(); if(!n){toast('Name is required');return;}
  let s=parseInt($('fbS').value)||5; s=Math.max(1,Math.min(5,s));
  (D[b].feedback=D[b].feedback||[]).unshift({id:'fb'+Date.now(),n,stars:s,note:$('fbT').value.trim()||'—',kind,ts:Date.now()});
  closeSheet(); render(); toast('Feedback added'); }

/* ---- Back of House: Business Education ---- */
function pEducation(b){ return head(b,'Business Education',``)+
  `<div class="rows">
     <div class="line"><div class="m"><div class="nm">Register as an employer · CCSS + INS</div><div class="meta">What you need, and the order to do it</div></div><span class="pill">Guide</span></div>
     <div class="line"><div class="m"><div class="nm">Price your jobs and set your menu</div><div class="meta">Visits, materials and labor — plus the 13% VAT</div></div><span class="pill">Guide</span></div>
     <div class="line"><div class="m"><div class="nm">Scheduling, routes and crews</div><div class="meta">Keep the calendar full and the no-shows down</div></div><span class="pill">Guide</span></div>
     <div class="line"><div class="m"><div class="nm">The electronic tiquete, explained</div><div class="meta">What it is, why it protects you, what is still pending</div></div><span class="pill">Guide</span></div>
     <div class="line"><div class="m"><div class="nm">Keep your customers, not the platform's</div><div class="meta">Build repeat business on your own directory</div></div><span class="pill">Guide</span></div>
   </div>
   <p class="note">A starter set from the shared BRASA business library — the same knowledge every BRASA business gets.</p>`; }

function pSuppliers(b){ const sup=[
   {n:'Distribuidora de Limpieza CR', cat:'Cleaning & janitorial supply', terms:'30 days', lead:'2–4 days'},
   {n:'AgroJardín del Valle', cat:'Landscape, soil & plants', terms:'Contado / 15 days', lead:'2–3 days'},
   {n:'Químicos para Piscina S.A.', cat:'Pool & water chemicals', terms:'30 days', lead:'1 week'},
   {n:'Ferretería Mayorista', cat:'Tools, fasteners & materials', terms:'15 days', lead:'2–3 days'},
   {n:'Maquinaria y Equipo', cat:'Mowers, pumps, equipment', terms:'Financing', lead:'1–2 weeks'},
  ];
  return head(b,'Suppliers','')+
  `<div class="rows">${sup.map(x=>`<div class="line"><div class="m"><div class="nm">${esc(x.n)}</div><div class="meta">${esc(x.cat)} \u00B7 terms ${esc(x.terms)} \u00B7 lead ${esc(x.lead)}</div></div><span class="pill">Supplier</span></div>`).join('')}</div>
   <p class="note">Who you reorder from and on what terms. Keeping suppliers and lead times here is how the trucks stay stocked without tying up cash.</p>`; }

function pReturns(b){ const d=D[b]; const sold=d.jobs.filter(j=>j.status==='sold');
  return head(b,'Returns & exchanges','')+
  `<div class="rows">${sold.length?sold.map(j=>`<div class="line"><div class="m"><div class="nm">${esc(j.label)}</div><div class="meta">${esc(j.cliente)} \u00B7 ${fmt(j.fee)}${j.paid?' \u00B7 Paid':' \u00B7 Unpaid'}</div></div><button class="btn sm" onclick="toast('Refund / re-do recorded against the original tiquete')">Record refund / re-do</button></div>`).join(''):`<div class="line"><div class="meta">No completed jobs to adjust yet</div></div>`}</div>
   <p class="note">A refund or re-do is a credit note against the original electronic tiquete \u2014 the job, the adjustment and the record stay tied together. Keep the receipt reference with every one.</p>`; }

function pInventory(b){ const d=D[b], inv=d.inventory||[]; const low=inv.filter(i=>i.qty<=i.reorder).length;
  return head(b,'Inventory',`Home & yard services bill from visits, labor and materials \u2014 this is the consumables and stock you keep on the truck, not your sellable jobs.`)+
  `<div class="stats"><div class="stat"><div class="n">${inv.length}</div><div class="l">Items</div></div><div class="stat"><div class="n">${low}</div><div class="l">To reorder</div></div></div>
   <div class="rows">${inv.map(i=>{ const lowi=i.qty<=i.reorder; return `<div class="line"><div class="m"><div class="nm">${esc(i.n)}</div><div class="meta">On hand ${i.qty} ${esc(i.unit)} \u00B7 reorder at ${i.reorder}</div></div><span class="pill ${lowi?'accent':'green'}">${lowi?'Reorder':'OK'}</span></div>`; }).join('')}</div>
   <p class="note">Your truck stock \u2014 cleaning supplies, chemicals, materials and fuel. Jobs and rates are listed on each board in the front office.</p>`; }

const PAGES={};
{ const b='co'; PAGES['co-dash']=()=>pDash(b); PAGES['co-facturas']=()=>pFacturas(b); PAGES['co-checkout']=()=>pCheckout(b); PAGES['co-feedback']=()=>pFeedback(b); PAGES['co-clientes']=()=>pCRM(b); PAGES['co-equipo']=()=>pEquipo(b); PAGES['co-ganancias']=()=>pGan(b); PAGES['co-estado']=()=>pEstado(b); PAGES['co-educacion']=()=>pEducation(b); PAGES['co-inventory']=()=>pInventory(b); PAGES['co-suppliers']=()=>pSuppliers(b); PAGES['co-returns']=()=>pReturns(b); BOARDS.forEach(k=>{ PAGES['co-'+k]=()=>pOps(b,k); }); }

function render(){ const slug=decodeURIComponent(location.hash.slice(1)); let html=null;
  if(slug && PAGES[slug]) html=PAGES[slug]();
  const heroPage = html && html.startsWith('<div class="hero"');
  $('view').innerHTML = html ? (heroPage ? (html.indexOf('<!--HC-->')>=0 ? html.replace('<!--HC-->','<section class="container page">')+'</section>' : html) : `<section class="container page">${html}</section>`) : home();
  document.body.classList.toggle('hero-mode', !html || heroPage);
  heroScroll();
  if(!slug) window.scrollTo(0,0); }
function heroScroll(){ const on=()=>document.body.classList.toggle('scrolled',(window.scrollY||0)>10); on(); if(window.__hs)window.removeEventListener('scroll',window.__hs); window.__hs=on; window.addEventListener('scroll',on,{passive:true}); }
document.addEventListener('click',e=>{ const a=e.target.closest('[data-route]'); if(!a)return;
  e.preventDefault(); const r=a.getAttribute('data-route'); if(r){location.hash='#'+r;} else {history.replaceState(null,'',location.pathname);render();window.scrollTo(0,0);} });
window.addEventListener('hashchange',render);
render();

</script>
</body>
</html>
