<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BRASA Business — Restaurant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Geist:wght@300..700&display=swap" rel="stylesheet">
<style>
:root{
  --brasa-black:#1B1A17; --brasa-soft:#6B6862; --brasa-accent:#8C3A1F; --brasa-green:#0D6E5C;
  --brasa-callout:#F2EDE0; --brasa-page:#FBF9F4; --brasa-cream:#F5F0E5; --brasa-rule:#E5DFD0; --brasa-hover:#6B280F;
  --serif:'Fraunces','Times New Roman',serif; --sans:'Geist','Helvetica Neue',system-ui,sans-serif;
  --max-w:1480px; --gutter:clamp(1.25rem,4vw,2.75rem);
  --ease:cubic-bezier(.22,.61,.36,1); --ease-out:cubic-bezier(.16,1,.3,1);
  --bg:var(--brasa-page); --bg-deep:var(--brasa-callout); --ink:var(--brasa-black);
  --ink-soft:var(--brasa-soft); --ink-faint:#A19E97; --ink-mute:var(--brasa-soft);
  --paper:var(--brasa-cream); --line:rgba(27,26,23,.12); --line-strong:rgba(27,26,23,.22); --accent:var(--brasa-accent);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
.container{width:100%;max-width:var(--max-w);margin:0 auto;padding-left:var(--gutter);padding-right:var(--gutter)}

.site-header{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;
  padding:.85rem var(--gutter);background:rgba(251,249,244,.92);backdrop-filter:blur(8px);border-bottom:.5px solid var(--line)}
.wordmark{display:flex;align-items:center;cursor:pointer}
.wordmark-img{height:50px;width:auto}
.nav{display:flex;gap:1.9rem;align-items:center}
.nav a{font-size:.8rem;font-weight:500;letter-spacing:.04em;color:var(--ink-soft);position:relative;padding:.2rem 0;transition:color .3s var(--ease);cursor:pointer}
.nav a:hover,.nav a.active{color:var(--ink)}
.nav a::after{content:'';position:absolute;bottom:-2px;left:0;height:1px;width:0;background:currentColor;transition:width .36s var(--ease)}
.nav a:hover::after,.nav a.active::after{width:100%}

main{padding-bottom:3rem;min-height:60vh}
.page{padding-top:clamp(2rem,5vh,3.4rem)}
.eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:500;margin-bottom:16px}
.cat-title{font-family:var(--serif);font-size:clamp(40px,7vw,58px);font-weight:400;letter-spacing:-.025em;line-height:1;margin-bottom:10px}
.cat-line{font-size:14px;color:var(--ink-soft);margin-bottom:30px;letter-spacing:.005em}
.lede{font-family:var(--serif);font-size:clamp(20px,3vw,27px);font-weight:300;line-height:1.32;letter-spacing:-.01em;color:var(--ink);max-width:36ch;margin-bottom:8px}

.vertical{margin-bottom:54px}
.vertical:last-of-type{margin-bottom:72px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.tile{position:relative;aspect-ratio:4/3;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#ECE6D8;border:.5px solid rgba(27,26,23,.06);cursor:pointer;transition:background .25s var(--ease),transform .25s var(--ease)}
.tile:hover{background:#E4DCC9;transform:translateY(-2px)}
.tile .tl{font-family:var(--serif);font-size:23px;font-weight:400;color:var(--ink);letter-spacing:-.015em;text-align:center;padding:0 14px;line-height:1.2}
.tile .sub{position:absolute;bottom:11px;left:0;right:0;text-align:center;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint)}

.back-link{display:inline-block;font-size:14px;color:var(--ink-mute);margin:6px 0 20px;cursor:pointer;transition:color .18s,transform .18s}
.back-link:hover{color:var(--ink);transform:translateX(-3px)}
.cat-hero{position:relative;aspect-ratio:16/6;background:#ECE6D8;display:flex;align-items:center;justify-content:center;margin-bottom:26px;overflow:hidden}
.cat-hero .h{font-family:var(--serif);font-size:clamp(40px,9vw,90px);font-weight:300;color:#D8CFBC;letter-spacing:-.03em}

.rows{border-top:.5px solid var(--line)}
.line{display:flex;align-items:center;gap:1rem;padding:14px 0;border-bottom:.5px solid var(--line)}
.line .dish-thumb{flex:0 0 auto;width:56px;height:56px;border-radius:7px;object-fit:cover;background:#ECE6D8;border:.5px solid rgba(27,26,23,.06)}
.dtile{position:relative;aspect-ratio:4/3;border-radius:6px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;background:#ECE6D8;border:.5px solid rgba(27,26,23,.06);cursor:pointer;text-decoration:none;transition:transform .22s var(--ease),box-shadow .22s var(--ease)}
.dtile:hover{transform:translateY(-2px);box-shadow:0 18px 36px -24px rgba(20,16,12,.55)}
.dtile-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.dtile.has-photo::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(18,14,10,.92),rgba(18,14,10,.3) 56%,rgba(18,14,10,0));z-index:1}
.dtile .dt-in{position:relative;z-index:2;padding:13px 14px}
.dtile .dt-nm{font-family:var(--serif);font-size:18px;font-weight:400;line-height:1.16;letter-spacing:-.01em;color:var(--ink)}
.dtile.has-photo .dt-nm{color:#FBF9F4}
.dtile .dt-pr{font-size:12px;letter-spacing:.02em;margin-top:5px;color:var(--ink-soft)}
.dtile.has-photo .dt-pr{color:rgba(245,240,229,.86)}
.dtile .dt-add,.dtile .dt-86{position:absolute;top:9px;right:9px;z-index:3;height:24px;min-width:24px;padding:0 7px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:13px;line-height:1}
.dtile .dt-add{background:var(--brasa-accent);color:#fff}
.dtile .dt-86{background:rgba(140,58,31,.16);color:var(--brasa-accent);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.dtile .pill.green{margin-left:5px;vertical-align:middle}
.dtile .dt-toggle{position:absolute;top:9px;left:9px;z-index:4;height:22px;padding:0 9px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(251,249,244,.94);color:var(--brasa-accent);border:1px solid rgba(140,58,31,.45);opacity:1;cursor:pointer}
.dtile .dt-toggle:hover{background:var(--brasa-accent);color:#fff}
.dtile .dt-compose{position:absolute;bottom:9px;right:9px;z-index:4;height:24px;padding:0 10px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:.02em;background:var(--brasa-accent);color:#fff;cursor:pointer;box-shadow:0 4px 12px -4px rgba(20,16,12,.5)}
.dtile .dt-compose:hover{filter:brightness(1.08)}
.dtile .dt-special{position:absolute;top:9px;left:9px;z-index:4;height:22px;padding:0 9px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--brasa-accent);color:#fff;box-shadow:0 4px 12px -5px rgba(20,16,12,.5)}
.ar-search{display:flex;gap:8px;margin:6px 0 4px}
.ar-search input{flex:1;min-width:0;padding:11px 14px;border:1px solid #E5DFD0;border-radius:8px;font:inherit;background:#fff;color:#1B1A17}
.ar-search input:focus{outline:none;border-color:var(--brasa-accent)}
.ar-search .btn{white-space:nowrap;margin:0}
#composeBar{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:60;display:flex;gap:14px;align-items:center;background:#1B1A17;color:#FBF9F4;padding:9px 10px 9px 18px;border-radius:30px;box-shadow:0 16px 40px -16px rgba(0,0,0,.55);font-size:13px}
#composeBar .btn{margin:0}
.line .m{flex:1;min-width:0}
.line .nm{font-weight:500}
.line .meta{font-size:13px;color:var(--ink-soft);margin-top:2px}
.line .v{font-family:var(--serif);font-size:18px;white-space:nowrap;text-align:right}
.pill{font-size:11px;letter-spacing:.03em;padding:2px 9px;border:.5px solid var(--line-strong);border-radius:999px;color:var(--ink-soft);white-space:nowrap}
.pill.accent{color:var(--accent);border-color:rgba(140,58,31,.45)}
.pill.green{color:var(--brasa-green);border-color:rgba(13,110,92,.45)}

.stats{display:flex;gap:2.6rem;flex-wrap:wrap;margin:6px 0 30px}
.stat .n{font-family:var(--serif);font-size:42px;font-weight:300;letter-spacing:-.02em;line-height:1}
.stat .l{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-top:6px}

.split{display:flex;justify-content:space-between;align-items:baseline;padding:12px 0;border-bottom:.5px solid var(--line);font-size:15px;color:var(--ink-soft)}
.split b{color:var(--ink);font-weight:500}
.split.grand{border-bottom:none;padding-top:16px}
.split.grand .a{font-family:var(--serif);font-size:30px;font-weight:400;color:var(--ink);letter-spacing:-.02em}

.note{font-size:14px;color:var(--ink-soft);line-height:1.65;max-width:62ch;margin-top:6px}
.pull-quote{font-family:var(--serif);font-size:clamp(20px,3.4vw,26px);font-style:italic;font-weight:300;text-align:center;
  padding:34px 0;border-top:.5px solid var(--line);border-bottom:.5px solid var(--line);margin:32px 0;letter-spacing:-.01em;line-height:1.35}
.section{margin-bottom:36px}
.section-h{font-family:var(--serif);font-size:22px;font-weight:400;letter-spacing:-.015em;margin-bottom:6px}
.section-sub{font-size:13px;color:var(--ink-soft);margin-bottom:14px}

.banner{background:var(--brasa-callout);border:.5px solid var(--line);padding:18px 20px;margin-bottom:26px}
.banner .bt{font-family:var(--serif);font-size:18px;margin-bottom:4px}
.banner .bs{font-size:13.5px;color:var(--ink-soft);line-height:1.55}
.banner .br{display:flex;justify-content:space-between;align-items:baseline;margin-top:10px;padding-top:10px;border-top:.5px solid var(--line)}
.banner .br .a{font-family:var(--serif);font-size:24px}
.miss{font-size:13px;color:var(--accent);margin-top:8px}

.kv{display:flex;justify-content:space-between;gap:1rem;padding:9px 0;border-bottom:.5px solid var(--line);font-size:14px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--ink-soft)} .kv .v{font-family:var(--serif);text-align:right} .kv .v.mono{font-family:var(--sans);font-size:13px;color:var(--ink-soft)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;font-family:var(--sans);font-size:13.5px;font-weight:500;
  padding:9px 16px;border-radius:2px;border:.5px solid var(--line-strong);background:transparent;color:var(--ink);cursor:pointer;transition:.18s}
.btn:hover{border-color:var(--ink)}
.btn.solid{background:var(--accent);color:#fff;border-color:var(--accent)} .btn.solid:hover{background:var(--brasa-hover);border-color:var(--brasa-hover)}
.btn.green{background:var(--brasa-green);color:#fff;border-color:var(--brasa-green)} .btn.green:hover{background:#0a5848}
.btn.sm{padding:7px 12px;font-size:13px}
.btn:disabled{opacity:.38;cursor:not-allowed;border-color:var(--line-strong);background:transparent;color:var(--ink-faint)}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

.scrim{position:fixed;inset:0;background:rgba(27,26,23,.5);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;z-index:100}
.scrim.show{display:flex;animation:fade .2s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{background:var(--bg);width:100%;max-width:580px;border-radius:14px 14px 0 0;padding:26px var(--gutter) 30px;max-height:92vh;overflow-y:auto;box-shadow:0 -20px 60px rgba(27,26,23,.18)}
@media(min-width:600px){.scrim{align-items:center}.sheet{border-radius:14px}}
.sheet h3{font-family:var(--serif);font-size:30px;font-weight:400;letter-spacing:-.02em;margin-bottom:4px}
.sheet .sub{font-size:13px;color:var(--ink-soft);margin-bottom:22px}
.field{margin-bottom:15px}
.field label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px}
.field input,.field select{width:100%;padding:11px 12px;border:.5px solid var(--line-strong);border-radius:2px;background:#fff;font-size:15px;font-family:var(--sans);color:var(--ink);outline:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.doc{border:.5px solid var(--line);background:#fff;padding:20px}
.doc .dh{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:3px}
.doc .dt{font-family:var(--serif);font-size:21px;margin-bottom:2px}
.doc .dm{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px}
.doc table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
.doc th{text-align:left;font-weight:500;color:var(--ink-faint);border-bottom:.5px solid var(--line);padding:6px 8px 6px 0;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase}
.doc td{padding:7px 8px 7px 0;border-bottom:.5px solid var(--line)}
.doc td.r,.doc th.r{text-align:right}
.doc .tot td{border-bottom:none;font-weight:600;border-top:1px solid var(--line-strong)}

.qrwrap{display:flex;justify-content:center;margin:8px 0 16px}
.qrwrap canvas{width:200px;height:200px;image-rendering:pixelated;border:.5px solid var(--line);background:#fff;border-radius:4px}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--brasa-black);color:var(--brasa-cream);
  padding:11px 20px;border-radius:3px;font-size:14px;opacity:0;pointer-events:none;transition:.25s var(--ease-out);z-index:300}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

footer{border-top:.5px solid var(--line);padding:30px var(--gutter);display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem;
  font-size:12.5px;color:var(--ink-soft);letter-spacing:.02em}
footer .b{font-family:var(--serif)}

@media(max-width:900px){ .wordmark-img{height:46px} .nav{gap:1.25rem} }
@media(max-width:560px){
  .grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .tile .tl{font-size:18px} .tile .sub{font-size:9px} .ptile .tl{font-size:17px}
  .nav a:not(.nav-home){display:none}
  .wordmark-img{height:40px}
  .stats{gap:1.6rem} .stat .n{font-size:34px}
  .doc{padding:14px} .doc table{font-size:12px}
}

.hero{position:relative;overflow:hidden;min-height:clamp(400px,58vh,560px);display:flex;align-items:flex-end;background:#16110e center/cover no-repeat}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(18,14,10,.5) 0%,rgba(18,14,10,0) 20%,rgba(18,14,10,0) 50%,rgba(18,14,10,.88) 100%);z-index:1}
.hero-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.hero-in{position:relative;z-index:2;width:100%;max-width:var(--max-w);margin:0 auto;padding:0 var(--gutter) clamp(32px,4vw,56px)}
.hero .back-link{display:inline-block;color:rgba(245,240,229,.8);margin-bottom:14px;text-shadow:0 1px 8px rgba(0,0,0,.4)}
.hero .back-link:hover{color:#FBF9F4}
.hero .eyebrow{color:rgba(245,240,229,.74);margin-bottom:14px}
.hero .cat-title{color:#FBF9F4;font-size:clamp(44px,8.4vw,76px);margin-bottom:12px;text-shadow:0 2px 30px rgba(0,0,0,.35)}
.hero .cat-line{color:rgba(245,240,229,.9)}
.hero .lede{color:rgba(245,240,229,.82);max-width:34ch}
.ptile{position:relative;display:flex;align-items:flex-end;aspect-ratio:4/3;border-radius:6px;overflow:hidden;background:#211c17;box-shadow:0 16px 36px -22px rgba(20,16,12,.5);text-decoration:none;transition:transform .18s ease,box-shadow .18s ease}
.ptile:hover{transform:translateY(-3px);box-shadow:0 24px 48px -22px rgba(20,16,12,.6)}
.ptile-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.ptile::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(12,9,6,.30) 0%,rgba(12,9,6,0) 42%);z-index:1}
.ptile .pt-in{position:relative;z-index:2;padding:16px 16px 15px;width:100%}
.ptile .tl{display:block;font-family:var(--serif);font-size:21px;font-weight:400;letter-spacing:-.012em;color:#fff;line-height:1.08;overflow-wrap:break-word;hyphens:auto;text-shadow:0 1px 3px rgba(0,0,0,.9),0 2px 16px rgba(0,0,0,.6)}
.ptile .sub{display:block;font-size:11px;letter-spacing:.03em;color:#fff;margin-top:6px;text-shadow:0 1px 3px rgba(0,0,0,.85),0 2px 12px rgba(0,0,0,.55)}
/* hero-mode: nav floats transparent over the hero, turns solid on scroll (brasa.world style) */
body.hero-mode .site-header{position:fixed;left:0;right:0;top:0;background:rgba(251,249,244,0);backdrop-filter:none;-webkit-backdrop-filter:none;border-bottom-color:transparent;transition:background .35s var(--ease),border-color .35s var(--ease)}
body.hero-mode .nav a{color:rgba(245,240,229,.86);text-shadow:0 1px 10px rgba(0,0,0,.45)}
body.hero-mode .nav a:hover,body.hero-mode .nav a.active{color:#FBF9F4}
body.hero-mode .wordmark-img{filter:drop-shadow(0 2px 10px rgba(0,0,0,.6))}
body.hero-mode.scrolled .site-header{background:rgba(251,249,244,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom-color:var(--line)}
body.hero-mode.scrolled .nav a{color:var(--ink-soft);text-shadow:none}
body.hero-mode.scrolled .nav a:hover,body.hero-mode.scrolled .nav a.active{color:var(--ink)}
body.hero-mode.scrolled .wordmark-img{filter:none}

/* --- BRASA join card in hero --- */
.hero-in-split{display:flex;align-items:flex-end;justify-content:space-between;gap:clamp(20px,4vw,48px)}
.hero-copy{flex:1 1 auto;min-width:0}
.hero-join{flex:0 0 auto;width:min(360px,42vw);background:var(--brasa-page);color:var(--ink);border-radius:14px;padding:20px 20px 22px;box-shadow:0 30px 80px -28px rgba(0,0,0,.72);text-align:left}
.hero-join .hj-eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:600;margin:0 0 4px}
.hero-join .hj-title{font-family:var(--serif);font-weight:400;font-size:26px;letter-spacing:-.02em;color:var(--ink);margin:0 0 14px;text-shadow:none;line-height:1.05}
.hero-join .hj-in{width:100%;box-sizing:border-box;padding:.6rem .75rem;margin:0 0 8px;font:400 14px var(--sans);border:1px solid var(--line-strong);border-radius:9px;background:#fff;color:var(--ink)}
.hero-join .hj-terms{display:flex;gap:.5rem;align-items:flex-start;margin:6px 0 0;font:400 11.5px/1.45 var(--sans);color:var(--ink-soft);cursor:pointer}
.hero-join .hj-terms input{margin-top:.15rem;flex:0 0 auto}
.hero-join .hj-btn{width:100%;margin-top:12px;padding:.7rem 1rem;font:600 14px var(--sans);color:var(--brasa-cream);background:var(--accent);border:0;border-radius:9px;cursor:pointer}
.hero-join .hj-btn.dark{background:var(--ink)}
.hero-join .hj-sub{font-size:13px;line-height:1.55;color:var(--ink-soft);margin:0}
.hero-join .hj-amt{font-family:var(--serif);font-size:30px;color:var(--ink);margin:0 0 8px;line-height:1}
.hero-join .hj-err{color:var(--accent);font-size:12px;margin:8px 0 0}
@media(max-width:860px){.hero-in-split{flex-direction:column;align-items:stretch}.hero-join{width:auto}}

</style>
</head>
<body>

<header class="site-header">
  <a class="wordmark" data-route="" aria-label="BRASA CR — Business">
    <img class="wordmark-img" src="https://assets.brasa.world/Photos/brasa-cr-logo_8.png" alt="BRASA CR"
         onerror="this.outerHTML='&lt;span style=&quot;font-family:var(--serif);font-weight:800;font-size:1.4rem&quot;&gt;BRASA &lt;b style=&quot;color:var(--accent)&quot;&gt;CR&lt;/b&gt;&lt;/span&gt;'">
  </a>
  <nav class="nav" aria-label="Primary">
    <a href="https://brasa.education/">Education</a>
    <a href="https://brasagovernment.net/">Government</a>
    <a class="active nav-home" data-route="">Business</a>
    <a href="https://brasa.world/">BRASA</a>
  </nav>
</header>

<main><div id="view"></div></main>

<footer>

const recipeOf=(packId,dishId)=>(RX[packId]&&RX[packId][dishId])||null;
function servingsAvail(packId,dishId){ const r=recipeOf(packId,dishId); if(!r)return Infinity; let s=Infinity; for(const a of r){ const g=ingMap.get(a[0]); const q=a[1]; if(!g||q<=0)continue; s=Math.min(s,Math.floor(g.onHand/q)); } return s; }
const makeable=(packId,dishId)=>servingsAvail(packId,dishId)>=1;
function deplete(packId,dishId,qty){ const r=recipeOf(packId,dishId); if(!r)return; r.forEach(a=>{ const g=ingMap.get(a[0]); if(g)drawFEFO(g,a[1]*qty); }); }
let MOVES=[], ledgerFilter='all';
function logMove(k,label,q,bal,n){ MOVES.unshift({t:Date.now(),k,label,q,bal,n:n||''}); if(MOVES.length>1500)MOVES.length=1500; liveCommit(); }
function receiveAllToPar(){ let c=0; ING.forEach(g=>{ const add=Math.max(0,g.par-g.onHand); if(add>0){ stockIn(g,add,defaultUseBy(g)); logMove('recv',g.name,+add,g.onHand,'to par'); c++; } }); reportAutoStock(); render(); toast(c+' item(s) filled to par'); }
function doReceive(id){ const g=ingMap.get(id); if(!g)return; const el=$('rcv-'+id); const v=parseFloat(el&&el.value); if(!v||v<=0){ toast('Enter a quantity'); return; } let ub=null; if(g.perishable){ const de=$('exp-'+id), ds=de&&de.value; ub=ds?Date.parse(ds+'T00:00:00'):defaultUseBy(g); } stockIn(g,v,ub); logMove('recv',g.name,+v,g.onHand,'received'+(g.perishable?' \u00b7 use-by '+fmtDay(ub):'')); reportAutoStock(); render(); toast(g.name+' +'+v.toLocaleString()+' '+g.uom+' received'); }
function setLedgerFilter(k){ ledgerFilter=k; render(); }
function pReceive(b){ const need=ING.filter(g=>g.onHand<g.par).sort((a,c)=>(a.onHand/a.par)-(c.onHand/c.par));
  return head(b,'Receive stock','Log a delivery. Type the quantity received \u2014 it is added to on-hand and written to the movement log.')+
   `<div class="section"><div class="line" style="border-bottom:none;padding-bottom:4px"><div class="m"><div class="section-h">Below par</div><div class="section-sub" style="margin-bottom:0">${need.length} item(s) you could restock</div></div>${need.length?`<button class="btn solid sm" onclick="receiveAllToPar()">Fill all to par</button>`:'<span class="pill green">OK</span>'}</div>
     <div class="rows">${need.length?need.map(g=>{ const sug=Math.max(0,Math.round(g.par-g.onHand)); return `<div class="line"><div class="m"><div class="nm">${esc(g.name)}</div><div class="meta">${Math.round(g.onHand).toLocaleString()} / ${g.par.toLocaleString()} ${g.uom} on hand \u00b7 reorder ${g.reorder.toLocaleString()}${g.onHand<=g.reorder?' \u00b7 low':''}${g.perishable?' \u00b7 perishable':''}</div></div>${g.perishable?`<input id="exp-${g.id}" type="date" title="Use-by date" style="margin-right:6px;padding:6px 8px;border:1px solid #d8cec4;border-radius:9px;font:inherit">`:''}<input id="rcv-${g.id}" type="number" min="0" inputmode="decimal" placeholder="+${sug.toLocaleString()}" style="width:96px;text-align:right;margin-right:8px;padding:7px 9px;border:1px solid #d8cec4;border-radius:9px;font:inherit"><button class="btn green sm" onclick="doReceive('${g.id}')">Receive</button></div>`; }).join(''):'<div class="line"><div class="meta">\u2713 Everything at or above par</div></div>'}</div></div>`; }
function pLedger(b){ const f=ledgerFilter; const rows=MOVES.filter(m=>f==='all'||m.k===f);
  const pill=k=>k==='recv'?'<span class="pill green">received</span>':k==='sale'?'<span class="pill accent">sold</span>':k==='waste'?'<span class="pill" style="background:#a8321c;color:#fff">wasted</span>':'<span class="pill">adjusted</span>';
  const tm=t=>{ const d=new Date(t); return d.toLocaleDateString([],{month:'short',day:'numeric'})+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); };
  const fb=(k,lab)=>`<button class="btn sm${f===k?' solid':''}" onclick="setLedgerFilter('${k}')">${lab}</button>`;
  return head(b,'Movement log','Every stock change, newest first \u2014 received, sold, adjusted. The audit trail behind on-hand.')+

/* ---- Live menu state (Phase 0): one shared source every channel reads.
   Set LIVE_API to the deployed Worker URL to go live across devices/channels;
   leave it empty and the POS runs exactly as before, fully local. ---- */
const LIVE_API="";              // e.g. "https://brasa-pos-live.<you>.workers.dev"
const LIVE_REST="rest_001";
let LIVE={ unavailable:new Set(), specials:[], updated:0 };
async function liveSync(){ if(!LIVE_API) return; try{
  const r=await fetch(`${LIVE_API}/v1/restaurant/${LIVE_REST}/state`,{cache:'no-store'});
  if(!r.ok) return; const s=await r.json();
  LIVE.unavailable=new Set(s.unavailable||[]); LIVE.specials=s.specials||[]; LIVE.updated=s.updated||0; render();
}catch(e){ /* offline: keep last-known state, fail safe */ } }
async function toggle86(packId,dishId){ const ref=packId+':'+dishId, willOff=!LIVE.unavailable.has(ref);
  if(willOff) LIVE.unavailable.add(ref); else LIVE.unavailable.delete(ref); render();   // optimistic
  if(!LIVE_API){ liveCommit(); toast(willOff?'86: '+dishOf(packId,dishId).name:'Back on: '+dishOf(packId,dishId).name); return; }
  try{ const r=await fetch(`${LIVE_API}/v1/restaurant/${LIVE_REST}/availability`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dish:ref,available:!willOff})});
    if(r.ok){ const s=await r.json(); LIVE.unavailable=new Set(s.unavailable||[]); render(); } else liveSync(); }
  catch(e){ liveSync(); } }
/* a dish is orderable when it is in stock AND not manually 86'd anywhere */
function liveAvail(packId,dishId){ return makeable(packId,dishId) && !LIVE.unavailable.has(packId+':'+dishId); }
let LIVE_WS=null, autoReported=new Set();
function liveConnect(){ if(!LIVE_API||(LIVE_WS&&LIVE_WS.readyState<=1)) return;
  try{ LIVE_WS=new WebSocket(LIVE_API.replace(/^http/,'ws')+`/v1/restaurant/${LIVE_REST}/socket`);
    LIVE_WS.onmessage=ev=>{ try{ const s=JSON.parse(ev.data); LIVE.unavailable=new Set(s.unavailable||[]); LIVE.specials=s.specials||[]; LIVE.updated=s.updated||0; render(); }catch(e){} };
    LIVE_WS.onclose=()=>{ LIVE_WS=null; setTimeout(liveConnect,3000); };   // auto-reconnect
    LIVE_WS.onerror=()=>{ try{LIVE_WS.close();}catch(e){} };
  }catch(e){ LIVE_WS=null; setTimeout(liveConnect,5000); } }
/* report stock-driven 86 transitions so other channels see sell-outs too */
function reportAutoStock(){ if(!LIVE_API) return; const auto=[];
  for(const p of PACKS){ for(const d of p.catalog){ if(!recipeOf(p.id,d.id)) continue; const ref=p.id+':'+d.id, ok=makeable(p.id,d.id);
    if(!ok&&!autoReported.has(ref)){ autoReported.add(ref); auto.push({dish:ref,available:false}); }
    else if(ok&&autoReported.has(ref)){ autoReported.delete(ref); auto.push({dish:ref,available:true}); } } }
  if(auto.length) fetch(`${LIVE_API}/v1/restaurant/${LIVE_REST}/autostock`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({auto})}).catch(()=>{});
}
/* ---- Live transport (zero-deploy). When LIVE_API is empty the POS still goes
   LIVE across every tab/window on this origin via BroadcastChannel + storage,
   and persists to localStorage so a reload never wipes inventory or the 86 list.
   Shares both the menu layer (86 list, specials, active menu) AND inventory
   (on-hand, lots, movement log) — so a sell-out on one screen auto-86's the dish
   on all of them. Set LIVE_API to the Worker URL to extend the menu layer to
   other devices; inventory keeps syncing locally either way. ---- */
const LIVE_KEY='brasa-pos:'+LIVE_REST;
const LIVE_ID=Math.random().toString(36).slice(2);   // this tab's id, to ignore our own echoes
let LIVE_BC=null, applyingRemote=false, liveCommitT=null, liveLastSeen='';
function liveSnapshot(){ return {
  by:LIVE_ID, updated:Date.now(),
  unavailable:[...LIVE.unavailable], specials:LIVE.specials||[], menu:(LIVE&&LIVE.menu)||null,
  inv:ING.map(g=>({id:g.id,onHand:g.onHand,lots:(g.lots||[]).map(l=>({q:l.q,useBy:l.useBy}))})),
  moves:MOVES.slice(0,400) }; }
function liveApply(s,remote){ if(!s)return;
  if(remote){ const tag=(s.by||'')+':'+(s.updated||0); if(tag===liveLastSeen)return; liveLastSeen=tag; }
  applyingRemote=true;
  try{
    if(Array.isArray(s.inv)) for(const r of s.inv){ const g=ingMap.get(r.id); if(g){ g.onHand=r.onHand; g.lots=(r.lots||[]).map(l=>({q:l.q,useBy:l.useBy})); } }
    if(Array.isArray(s.moves)) MOVES=s.moves;
    if(!LIVE_API){                                   // menu layer is local-authoritative only when no Worker is set
      LIVE.unavailable=new Set(s.unavailable||[]); LIVE.specials=s.specials||[]; LIVE.updated=s.updated||0;
      if(s.menu){ const m=(typeof MENUS!=='undefined')&&MENUS.find(x=>x.id===s.menu); if(m)MANIFEST=m; LIVE.menu=s.menu; }
    }
  } finally { applyingRemote=false; }

}
function liveRestore(){ try{ const raw=localStorage.getItem(LIVE_KEY); if(raw) liveApply(JSON.parse(raw),false); }catch(e){} }
function liveCommit(){ if(applyingRemote)return; clearTimeout(liveCommitT); liveCommitT=setTimeout(()=>{
  const snap=liveSnapshot();
  try{ localStorage.setItem(LIVE_KEY,JSON.stringify(snap)); }catch(e){}   // persist + fires 'storage' in other tabs
  try{ if(LIVE_BC) LIVE_BC.postMessage(snap); }catch(e){}                 // instant same-origin push
}, 120); }
function liveStart(){ liveRestore();
  try{ if('BroadcastChannel' in window){ LIVE_BC=new BroadcastChannel('brasa-pos:'+LIVE_REST);
    LIVE_BC.onmessage=ev=>{ const s=ev.data; if(s&&s.by!==LIVE_ID) liveApply(s,true); }; } }catch(e){}
  window.addEventListener('storage',ev=>{ if(ev.key!==LIVE_KEY||!ev.newValue)return;
    try{ const s=JSON.parse(ev.newValue); if(s&&s.by!==LIVE_ID) liveApply(s,true); }catch(e){} });
}

/* ============================================================================
   ENGINE — SINPE payment, automatic per-transaction VAT remittance to Hacienda
   (the 13% VAT is the State's money the instant it is collected; the business
   never holds it). HR payroll -> CCSS / INS as monthly planillas.
   ============================================================================ */
const subs=b=>D[b].team.filter(t=>t.role!=='owner');
const period=()=>new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'});
const paidJobs=b=>D[b].jobs.filter(j=>j.paid);
/* HR is HR — the same Costa Rica labor engine the restaurant uses. The owner sets the
   wage (their arrangement); BRASA computes the statutory charges, renta, and accruals. */
const monthsSince=ts=>(Date.now()-(ts||Date.now()))/(30.44*DAY);
const monthlyWage=w=>w.wageType==='hourly'?(w.wage*CFG.workweekHours*4.33):(w.wage||0);
const rentaMonthly=g=>{ let tax=0,prev=0; for(const [cap,rate] of CFG.rentaBrackets){ const amt=Math.min(g,cap)-prev; if(amt>0)tax+=amt*rate; prev=cap; if(g<=cap)break; } return tax; };
const vacAccrued=w=>monthsSince(w.hired)*(CFG.vacDaysPerYear/12);
const vacBalance=w=>Math.max(0,vacAccrued(w)-(w.vacTaken||0));
function aguinaldoAccrued(w){ const n=new Date(); let dec=new Date(n.getFullYear(),11,1); if(n<dec)dec=new Date(n.getFullYear()-1,11,1);
  const m=Math.min(12,Math.min((Date.now()-dec.getTime())/(30.44*DAY),monthsSince(w.hired))); return monthlyWage(w)*(m/12); }
function planilla(b){ return subs(b).map(w=>{ const base=monthlyWage(w); if(!(base>0))return null;
  const employee=base*CFG.ccssEmployee, renta=rentaMonthly(base), net=base-employee-renta;
  const employer=base*CFG.ccssEmployer, premium=base*CFG.insWC, agui=base*CFG.aguinaldoRate, vac=base*VAC_FRACTION, cost=base+employer+premium+agui+vac;
  return { w, base, employee, renta, net, employer, premium, agui, vac, cost }; }).filter(Boolean); }
function hrIssues(b){ const out=[]; subs(b).forEach(w=>{ const mw=monthlyWage(w);
  if(!w.cedula)out.push([w.n,'Missing ID']);
  if(!w.niss)out.push([w.n,'Missing CCSS social no. — blocks SICERE']);
  if(!w.fechaNac)out.push([w.n,'Missing birth date — blocks INS']);
  if(mw>0 && mw<CFG.minWageMonthly)out.push([w.n,'Wage below reference minimum']); }); return out; }
const revenue=b=>paidJobs(b).reduce((a,j)=>a+j.fee,0);
function ivaSummary(b){ const R=D[b].remittance; const isSplit=r=>r.status==='split'||r.status==='remitted'; return { collected:R.reduce((a,r)=>a+r.iva,0), remitted:R.filter(isSplit).reduce((a,r)=>a+r.iva,0), ownerNet:R.reduce((a,r)=>a+r.base,0), count:R.length }; }
const vatOf=b=>ivaSummary(b).collected;
/* remitToHacienda — split VAT off a paid sale, book it to the remittance ledger,
   hand it to the factura-electronica rail. The business never owns it. */
function remit(b,j){ const iva=j.fee-j.fee/(1+CFG.vat), base=j.fee-iva, ref='FE-'+(j.n||0)+'-'+Date.now().toString(36).toUpperCase().slice(-5);
  j._iva=iva; j.remitRef=ref; j.remitStatus='split';
  D[b].remittance.push({ n:j.n, ts:j.ts, cliente:j.cliente, base, iva, rate:CFG.vat, cedula:D[b].patrono.cedula, status:'split', ref }); return iva; }
function ready(b,e){ const p=D[b].patrono, L=planilla(b), miss=[];
  if(e==='ccss'){ if(!p.patronalCCSS)miss.push('CCSS employer number'); L.forEach(x=>{ if(!x.w.niss)miss.push('social no. for '+x.w.n.split(' ')[0]); if(!x.w.cedula)miss.push('ID for '+x.w.n.split(' ')[0]); }); }
  if(e==='hacienda'){ if(!p.cedula)miss.push('Tax ID (ATV)'); if(!p.ciiu)miss.push('CIIU activity'); }
  if(e==='ins'){ if(!p.polizaINS)miss.push('INS policy (WC)'); L.forEach(x=>{ if(!x.w.cedula)miss.push('ID for '+x.w.n.split(' ')[0]); if(!x.w.fechaNac)miss.push('birth date for '+x.w.n.split(' ')[0]); }); }
  if(e==='renta'){ if(!p.cedula)miss.push('Tax ID (ATV)'); L.forEach(x=>{ if(!x.w.cedula)miss.push('ID for '+x.w.n.split(' ')[0]); }); }
  return { ok:miss.length===0, miss:[...new Set(miss)] }; }

/* seed: book the VAT remittance for jobs already paid by SINPE */
['rest'].forEach(b=>{ paidJobs(b).forEach(j=>{ j.method='sinpe'; j.n=++D[b]._n; j.ts=Date.now()-D[b]._n*36e5; remit(b,j); }); });

const active=()=>activeOrder?getOrder(activeOrder):null;

const tableStatus=t=>tableOrder(t.id)?'occupied':(resvFor(t.id)?'reserved':'open');
const tableName=tid=>{ const t=D.rest.tables.find(x=>x.id===tid); return t?t.name:tid; };
const elapsed=ts=>{ const m=Math.floor((Date.now()-ts)/60000); return m<1?'just now':m+' min'; };

function addToCart(packId,id){ let o=active(); if(!o||o.status==='paid')o=newOrder('takeaway',null,''); const d=dishOf(packId,id); if(!d)return; const ex=o.items.find(x=>x.packId===packId&&x.id===id); if(ex)ex.qty++; else o.items.push({packId,id,name:d.name,price:d.price,qty:1}); if(o.status==='ready'||o.status==='served')o.status='open'; render(); }
function incItem(oid,idx,delta){ const o=getOrder(oid); if(!o)return; const it=o.items[idx]; if(!it)return; it.qty+=delta; if(it.qty<=0)o.items.splice(idx,1); render(); }
function clearCart(){ const o=active(); if(o){ if(o.status==='open'&&!o.table)O().splice(O().indexOf(o),1); else o.items=[]; } activeOrder=null; render(); }
function cancelOrder(oid){ const o=getOrder(oid); if(!o)return; O().splice(O().indexOf(o),1); if(activeOrder===oid)activeOrder=null; location.hash='#rest-orders'; }
const cartLines=()=>{ const o=active(); return o?o.items.map((it,idx)=>({idx,it})):[]; };
const cartTotal=()=>orderTotal(active());
const cartCount=()=>orderCount(active());

function seatTable(tid){ let o=tableOrder(tid); if(!o){ const r=resvFor(tid); o=newOrder('dine',tid,r?r.name:''); if(r)r.status='seated'; } else activeOrder=o.id; location.hash='#rest-order-'+o.id; }
function seatResv(rid){ const r=D.rest.reservations.find(x=>x.id===rid); if(!r)return; let tid=r.table; if(!tid){ const t=D.rest.tables.find(x=>tableStatus(x)==='open'); if(!t){toast('No open table');return;} tid=t.id; } const o=newOrder('dine',tid,r.name); r.status='seated'; location.hash='#rest-order-'+o.id; }

function attachClientPicker(b){ const o=active(); if(!o){toast('Start an order first');return;} openSheet(`<h3>Attach client</h3><div class="sub">For loyalty points — your relationship, not the platform's</div>
  <div class="rows">${D[b].clientes.map(c=>`<div class="line" style="cursor:pointer" onclick="pickClient('${b}','${c.id}')"><div class="m"><div class="nm">${esc(c.n)}</div><div class="meta">${c.points||0} pts</div></div></div>`).join('')}</div>

function chargeOrder(oid){ const o=getOrder(oid); if(!o){toast('No order');return;} const total=orderTotal(o); if(total<=0){toast('Add items first');return;} activeOrder=o.id;
  const ref='SINPE-'+Date.now().toString(36).toUpperCase(); o.sinpeRef=ref; const payload='SINPE|'+D.rest.sinpe+'|'+Math.round(total)+'|CRC|'+ref;
  const vat=total-total/(1+CFG.vat);
  openSheet(`<h3>Charge ${fmt(total)}</h3><div class="sub">Order #${o.n} · ${CH[o.channel]}${o.table?' · '+esc(tableName(o.table)):''}${o.customer?' · '+esc(o.customer):''} · SINPE Móvil</div>
    <div class="qrwrap"><canvas id="qrc"></canvas></div>
    <div class="kv"><span class="k">SINPE Móvil</span><span class="v mono">${esc(D.rest.sinpe)}</span></div>
    <div class="kv"><span class="k">Amount</span><span class="v">${fmt(total)}</span></div>
    <div class="kv"><span class="k">Reference</span><span class="v mono">${ref}</span></div>
    <div class="line" style="border-top:1px solid var(--brasa-rule);margin-top:8px;padding-top:10px;border-bottom:none"><div class="m"><div class="nm">SINPE splits it at the rail</div><div class="meta">Operated by Banco Central de Costa Rica</div></div></div>
    <div class="kv"><span class="k">→ To you</span><span class="v">${fmt(total-vat)}</span></div>
    <div class="kv"><span class="k">→ To Hacienda · VAT 13%</span><span class="v">${fmt(vat)}</span></div>
    <p class="note" style="margin:12px 0">Your customer pays by SINPE. Because SINPE is run by the national bank (BCCR), the rail splits the payment itself — ${fmt(total-vat)} to <b>your</b> account and the 13% VAT (${fmt(vat)}) straight to Hacienda. BRASA never touches the money; it only records the sale and issues the Tiquete Electrónico (v4.4).</p>
    <div class="btnrow"><button class="btn solid" onclick="confirmCharge('rest')">Confirm SINPE received · issue tiquete</button><button class="btn" onclick="closeSheet()">Cancel</button></div>`);
  const c=$('qrc'); if(c) drawQR(c,payload,5); }
function confirmCharge(b){ const o=active(); if(!o)return; const total=orderTotal(o); if(total<=0)return;
  o.items.forEach(it=>deplete(it.packId,it.id,it.qty)); reportAutoStock(); logMove('sale','Order #'+o.n,-o.items.reduce((a,it)=>a+it.qty,0),null,o.items.map(it=>it.qty+'× '+it.name).join(', ').slice(0,90));
  const tq=buildTiquete({items:o.items, sinpeRef:o.sinpeRef||'', cliente:(o.customer||'Walk-in')});
  D[b].comprobantes.unshift(tq);
  const lines=o.items.map(it=>({name:it.name,qty:it.qty,price:it.price}));
  const txn={ id:'s'+o.n, n:o.n, cliente:(o.customer||'Walk-in'), fee:total, ts:Date.now(), method:'sinpe', paid:true, status:'served', channel:o.channel, lines, clave:tq.clave };
  D[b].jobs.unshift(txn); const iva=remit(b,txn); let pts=0;
  if(o.clientId){ const c=D[b].clientes.find(x=>x.id===o.clientId); if(c){ pts=Math.floor(total/CFG.loyaltyEarnPer); c.points=(c.points||0)+pts; (c.history=c.history||[]).unshift({n:o.n,total,ts:Date.now()}); } }
  O().splice(O().indexOf(o),1); activeOrder=null; closeSheet();
  if(location.hash.indexOf('rest-order-')>=0)location.hash='#rest-orders'; else render();
  toast('SINPE split → '+fmt(total-iva)+' to you · '+fmt(iva)+' VAT to Hacienda · Tiquete '+tq.consec.slice(-6)+' issued'+(pts?' · +'+pts+' pts':''));
  setTimeout(()=>openComprobante(tq.clave),300); }

function pGan(b){ const d=D[b], P=paidJobs(b);

  const tG=rows.reduce((a,r)=>a+r.gross,0), tI=rows.reduce((a,r)=>a+r.iva,0), tN=rows.reduce((a,r)=>a+r.net,0);
  const L=planilla(b), ccss=L.reduce((a,x)=>a+x.employee+x.employer,0), ins=L.reduce((a,x)=>a+x.premium,0);
  const third=tG*.25;

/* ===== Hacienda factura electrónica v4.4 — Tiquete Electrónico (B2C). =====
   BRASA generates the comprobante and reports VAT; it never settles money.
   Signing (.p12 from BCCR) + transmission to TRIBU-CR happen in the backend. */
const CABYS_FOOD='6311000000000';            // default CAByS, prepared-food service — map per dish in production
const SINPE_MEDIO={codigo:'06',nombre:'SINPE Móvil'};  // MediosPago catálogo v4.4
const FE_SISTEMA='BRASA · brasa.world';       // Identificación de Sistema (required in v4.4)
const zp=(n,l)=>String(n).padStart(l,'0');
function nextConsec(tipo){ const e=D.rest.emisor; D.rest.comprobanteSeq[tipo]=(D.rest.comprobanteSeq[tipo]||0)+1; return e.sucursal+e.terminal+tipo+zp(D.rest.comprobanteSeq[tipo],10); }
function claveFor(consec){ const e=D.rest.emisor, d=new Date(); const ced=zp(e.cedula.replace(/\D/g,''),12); return '506'+zp(d.getDate(),2)+zp(d.getMonth()+1,2)+zp(d.getFullYear()%100,2)+ced+consec+'1'+zp(Math.floor(Math.random()*1e8),8); }
function buildTiquete(src){ const tipo='04', consec=nextConsec(tipo), clave=claveFor(consec);
  const lines=src.items.map((it,i)=>{ const tl=it.price*it.qty, base=tl/(1+CFG.vat), iva=tl-base; return { n:i+1, cabys:CABYS_FOOD, detalle:it.name, cantidad:it.qty, precioUnitario:base/it.qty, montoTotal:base, subTotal:base, impuesto:iva, montoTotalLinea:tl }; });
  const totalVentaNeta=lines.reduce((a,l)=>a+l.subTotal,0), totalImpuesto=lines.reduce((a,l)=>a+l.impuesto,0);
  return { clave, consec, tipo, fecha:Date.now(), emisorSnap:{cedula:D.rest.emisor.cedula,nombre:D.rest.biz,actividad:D.rest.patrono.ciiu}, medio:SINPE_MEDIO, sistema:FE_SISTEMA, sinpeRef:src.sinpeRef||'', cliente:src.cliente||'', lines, totalVentaNeta, totalImpuesto, totalComprobante:totalVentaNeta+totalImpuesto, estado:'generado' }; }
function feXML(c){ const e=c.emisorSnap, f=new Date(c.fecha).toISOString();
  const L=c.lines.map(l=>'  <LineaDetalle>\n    <NumeroLinea>'+l.n+'</NumeroLinea>\n    <CodigoCABYS>'+l.cabys+'</CodigoCABYS>\n    <Cantidad>'+l.cantidad+'</Cantidad>\n    <UnidadMedida>Unid</UnidadMedida>\n    <Detalle>'+l.detalle+'</Detalle>\n    <PrecioUnitario>'+l.precioUnitario.toFixed(5)+'</PrecioUnitario>\n    <MontoTotal>'+l.montoTotal.toFixed(5)+'</MontoTotal>\n    <SubTotal>'+l.subTotal.toFixed(5)+'</SubTotal>\n    <Impuesto>\n      <Codigo>01</Codigo><CodigoTarifaIVA>08</CodigoTarifaIVA><Tarifa>13.00</Tarifa><Monto>'+l.impuesto.toFixed(5)+'</Monto>\n    </Impuesto>\n    <ImpuestoNeto>'+l.impuesto.toFixed(5)+'</ImpuestoNeto>\n    <MontoTotalLinea>'+l.montoTotalLinea.toFixed(5)+'</MontoTotalLinea>\n  </LineaDetalle>').join('\n');
  return '<?xml version="1.0" encoding="UTF-8"?>\n<TiqueteElectronico xmlns="https://cdn.comprobanteselectronicos.go.cr/xml-schemas/v4.4/tiqueteElectronico">\n  <Clave>'+c.clave+'</Clave>\n  <ProveedorSistemas>'+c.sistema+'</ProveedorSistemas>\n  <NumeroConsecutivo>'+c.consec+'</NumeroConsecutivo>\n  <FechaEmision>'+f+'</FechaEmision>\n  <Emisor>\n    <Nombre>'+e.nombre+'</Nombre>\n    <Identificacion><Tipo>02</Tipo><Numero>'+e.cedula.replace(/\D/g,'')+'</Numero></Identificacion>\n    <CodigoActividadEmisor>'+e.actividad+'</CodigoActividadEmisor>\n  </Emisor>\n  <CondicionVenta>01</CondicionVenta>\n'+L+'\n  <ResumenFactura>\n    <CodigoTipoMoneda><CodigoMoneda>CRC</CodigoMoneda><TipoCambio>1.00000</TipoCambio></CodigoTipoMoneda>\n    <TotalVentaNeta>'+c.totalVentaNeta.toFixed(5)+'</TotalVentaNeta>\n    <TotalImpuesto>'+c.totalImpuesto.toFixed(5)+'</TotalImpuesto>\n    <TotalComprobante>'+c.totalComprobante.toFixed(5)+'</TotalComprobante>\n    <MedioPago><TipoMedioPago>'+c.medio.codigo+'</TipoMedioPago></MedioPago>\n  </ResumenFactura>\n  <!-- XAdES-EPES ds:Signature — firmado con la llave criptográfica .p12 del BCCR y transmitido a TRIBU-CR (backend) -->\n</TiqueteElectronico>'; }
function signTransmit(clave){ const c=D.rest.comprobantes.find(x=>x.clave===clave); if(!c||c.estado==='aceptado')return; c.estado='aceptado'; c.simulado=true; render(); openComprobante(clave); toast('Tiquete '+c.consec.slice(-6)+' aceptado (simulado) · firma .p12 + TRIBU-CR pendiente de backend'); }

    <div class="rows" style="margin:12px 0">${c.lines.map(l=>`<div class="line"><div class="m"><div class="nm">${l.cantidad}× ${esc(l.detalle)}</div><div class="meta">CAByS ${l.cabys} · neto ${fmt(l.subTotal)} · IVA ${fmt(l.impuesto)}</div></div><span class="v">${fmt(l.montoTotalLinea)}</span></div>`).join('')}</div>

    <p class="note">${c.estado==='aceptado'?'Structured to Hacienda v4.4. Real acceptance needs XAdES signing with the business\u2019s BCCR llave criptográfica (.p12) and transmission to TRIBU-CR — that runs in the backend, not this preview.':'Generated and ready to sign. Signing (.p12 from BCCR) and transmission to TRIBU-CR run in the backend; this models that step.'}</p>
    <div class="btnrow">${c.estado!=='aceptado'?`<button class="btn solid" onclick="signTransmit('${c.clave}')">Firmar y transmitir (TRIBU-CR)</button>`:''}<button class="btn" onclick="toggleXML('${c.clave}')">Ver XML</button><button class="btn" onclick="closeSheet()">Cerrar</button></div>
    <pre id="xml-${c.clave}" class="mono" style="display:none;white-space:pre-wrap;font-size:10px;background:var(--brasa-cream);padding:12px;border:1px solid var(--brasa-rule);border-radius:8px;margin-top:12px;max-height:320px;overflow:auto">${esc(feXML(c))}</pre>`; }
function pComprobantes(b){ const list=D[b].comprobantes, iva=list.reduce((a,c)=>a+c.totalImpuesto,0), acc=list.filter(c=>c.estado==='aceptado').length;

   <p class="note" style="margin:8px 0 16px">Signing uses the business\u2019s BCCR llave criptográfica (.p12) and transmits to TRIBU-CR; that runs in the backend. Here each comprobante is shown exactly as structured for Hacienda v4.4 — tap to view, including the XML.</p>
   ${list.length?`<div class="rows">${list.map(c=>`<div class="line" style="cursor:pointer" onclick="openComprobante('${c.clave}')"><div class="m"><div class="nm">Tiquete ${c.consec.slice(-10).replace(/^0+/,'')} · ${fmt(c.totalComprobante)} ${c.estado==='aceptado'?`<span class="pill green" style="margin-left:6px">aceptado${c.simulado?' (sim)':''}</span>`:'<span class="pill accent" style="margin-left:6px">por firmar</span>'}</div><div class="meta mono">${c.clave.slice(0,21)}… · IVA ${fmt(c.totalImpuesto)} · ${esc(c.medio.nombre)}</div></div><span class="v">›</span></div>`).join('')}</div>`:'<p class="note">No tiquetes yet. Charge an order by SINPE and the first electronic tiquete appears here.</p>'}`; }

/* =================== Phase 2: the composer (build your own menu) ===================
   A manifest = owner-named sections, each listing references {packId,dishId} into the
   library (+ optional name/price overrides + signature), plus house items. Composed
   menus render through the SAME tiles/recipes/photos/live-86 by using the real refs. */
let MENUS=[], MANIFEST=null, autoByTime=false;
function newManifest(name){ return { id:'m_'+Math.random().toString(36).slice(2,8), name:(name||'Menú').trim()||'Menú', currency:'CRC', vatInclusive:true, sections:[], houseItems:[], _hid:0, start:null, end:null }; }
function manifestFromPack(packId,name){ const p=packById(packId); const m=newManifest(name||(p&&p.style)||'Mi Menú'); if(p){ const order=[],by={}; p.catalog.forEach(d=>{ const c=d.cat||'Menú'; if(!by[c]){by[c]=[];order.push(c);} by[c].push(d); }); m.sections=order.map(c=>({name:c,items:by[c].map(d=>({ref:{packId,dishId:d.id}}))})); } return m; }
MENUS.push(manifestFromPack('cr','Mi Menú')); MANIFEST=MENUS[0];
let COMPOSING=false, composeTarget=0;
function mfSave(){ /* Phase 5: persist to the Worker/D1. For now in-memory + Export JSON. */ }
function mfRenameMenu(){ const v=prompt('Menu name:', MANIFEST.name); if(v){ MANIFEST.name=v.trim()||MANIFEST.name; render(); } }
function mfFindRef(packId,dishId){ for(let si=0;si<MANIFEST.sections.length;si++){ const ii=MANIFEST.sections[si].items.findIndex(it=>it.ref.packId===packId&&it.ref.dishId===dishId); if(ii>=0)return{si,ii}; } return null; }
function mfAddSection(name){ name=(name||'').trim()||('Sección '+(MANIFEST.sections.length+1)); MANIFEST.sections.push({name,items:[]}); composeTarget=MANIFEST.sections.length-1; mfSave(); return composeTarget; }
function mfNewSection(){ mfAddSection(prompt('New section name:')||''); render(); }
function mfAdd(packId,dishId){ if(!MANIFEST.sections.length) mfAddSection('General'); if(mfFindRef(packId,dishId)){ toast('Already on your menu'); return; } const ti=Math.min(composeTarget,MANIFEST.sections.length-1); MANIFEST.sections[ti].items.push({ref:{packId,dishId}}); mfSave(); const d=dishOf(packId,dishId); toast('Added '+(d?d.name:dishId)+' → '+MANIFEST.sections[ti].name); render(); }
function mfRemove(si,ii){ MANIFEST.sections[si].items.splice(ii,1); mfSave(); render(); }
function mfRenameSection(si){ const v=prompt('Section name:', MANIFEST.sections[si].name); if(v!=null){ MANIFEST.sections[si].name=v.trim()||MANIFEST.sections[si].name; mfSave(); render(); } }
function mfMoveSection(si,dir){ const j=si+dir; if(j<0||j>=MANIFEST.sections.length)return; const a=MANIFEST.sections; const t=a[si]; a[si]=a[j]; a[j]=t; if(composeTarget===si)composeTarget=j; else if(composeTarget===j)composeTarget=si; mfSave(); render(); }
function mfDelSection(si){ if(!confirm('Remove this whole section?'))return; MANIFEST.sections.splice(si,1); composeTarget=0; mfSave(); render(); }
function mfRename(si,ii){ const it=MANIFEST.sections[si].items[ii]; const d=dishOf(it.ref.packId,it.ref.dishId); const v=prompt('Display name on your menu:', it.name||(d?d.name:'')); if(v!=null){ const t=v.trim(); if(!t||(d&&t===d.name))delete it.name; else it.name=t; mfSave(); render(); } }
function mfReprice(si,ii){ const it=MANIFEST.sections[si].items[ii]; const d=dishOf(it.ref.packId,it.ref.dishId); const cur=it.price!=null?it.price:(d?d.price:0); const v=prompt('Price in colones (VAT-inclusive):', cur); if(v!=null){ const n=Math.max(0,Math.round(parseFloat(v)||0)); if(!n||(d&&n===d.price))delete it.price; else it.price=n; mfSave(); render(); } }
function mfSig(si,ii){ const it=MANIFEST.sections[si].items[ii]; it.signature=!it.signature; mfSave(); render(); }
function mfSetTarget(si){ composeTarget=si; render(); }
function mfAddHouse(){ const name=prompt('House dish name:'); if(!name)return; const pv=prompt('Price in colones (VAT-inclusive):','3000'); if(pv==null)return; const price=Math.max(0,Math.round(parseFloat(pv)||0)); if(!price){toast('Need a price');return;} const hid='h'+(++MANIFEST._hid); MANIFEST.houseItems.push({id:hid,name:name.trim(),price,cat:'Especiales',veg:false}); if(!MANIFEST.sections.length)mfAddSection('Especiales'); const ti=Math.min(composeTarget,MANIFEST.sections.length-1); MANIFEST.sections[ti].items.push({ref:{packId:'house',dishId:hid}}); mfSave(); toast('House dish added: '+name.trim()); render(); }
function titleFromUrl(u){ try{ const parts=new URL(u).pathname.split('/').filter(Boolean); let slug=parts.slice().reverse().find(p=>/[a-z]/i.test(p)&&!/^\d+$/.test(p))||parts[0]||'Recipe'; slug=slug.replace(/\.html?$/,''); return slug.split('-').map(w=>w?w[0].toUpperCase()+w.slice(1):w).join(' '); }catch(e){ return 'Recipe'; } }
function mfAddRecipeLink(){ const url=prompt('Paste the recipe URL (e.g. an AllRecipes page):'); if(!url)return; let u=url.trim(); if(!/^https?:\/\//i.test(u))u='https://'+u;
  const name=prompt('Dish name on your menu:', titleFromUrl(u)); if(!name)return;
  const pv=prompt('Price in colones (VAT-inclusive):','3500'); if(pv==null)return; const price=Math.max(0,Math.round(parseFloat(pv)||0)); if(!price){ toast('Need a price'); return; }
  const hid='h'+(++MANIFEST._hid); MANIFEST.houseItems.push({id:hid,name:name.trim(),price,cat:'Especiales',veg:false,source:u});
  if(!MANIFEST.sections.length)mfAddSection('General'); const ti=Math.min(composeTarget,MANIFEST.sections.length-1); MANIFEST.sections[ti].items.push({ref:{packId:'house',dishId:hid}}); mfSave(); toast('Recipe saved: '+name.trim()); render(); }
function mfExport(){ const json=JSON.stringify({name:MANIFEST.name,currency:MANIFEST.currency,vatInclusive:MANIFEST.vatInclusive,sections:MANIFEST.sections,houseItems:MANIFEST.houseItems},null,2); try{navigator.clipboard&&navigator.clipboard.writeText(json);}catch(e){} openSheet('<h3>Menu JSON</h3><div class="sub">Copied to clipboard. This is the manifest Phase 5 stores on the server.</div><pre style="white-space:pre-wrap;font-size:11px;max-height:52vh;overflow:auto;background:#F4F1EA;padding:12px;border-radius:8px">'+esc(json)+'</pre>'); }
function startCompose(){ COMPOSING=true; if(!MANIFEST.sections.length)mfAddSection('General'); toast('Tap ＋ on any dish to add it · '+MANIFEST.sections[Math.min(composeTarget,MANIFEST.sections.length-1)].name); location.hash='#rest-fam-0'; }
function stopCompose(){ COMPOSING=false; location.hash='#rest-compose'; }
function composeBar(){ let b=document.getElementById('composeBar'); if(COMPOSING){ const sec=MANIFEST.sections[Math.min(composeTarget,MANIFEST.sections.length-1)]; if(!b){ b=document.createElement('div'); b.id='composeBar'; document.body.appendChild(b); } b.innerHTML='<span>Adding to <b>'+esc(sec?sec.name:'menu')+'</b></span><button class="btn solid sm" onclick="stopCompose()">✓ Done</button>'; } else if(b){ b.remove(); } }
/* override-aware add-to-cart: pulls the manifest name/price for this ref if present */
function addToCartC(packId,id){ const d=dishOf(packId,id); if(!d)return; const loc=mfFindRef(packId,id); const it=loc?MANIFEST.sections[loc.si].items[loc.ii]:null; const nm=(it&&it.name)||d.name, pr=(it&&it.price!=null)?it.price:d.price; let o=active(); if(!o||o.status==='paid')o=newOrder('takeaway',null,''); const ex=o.items.find(x=>x.packId===packId&&x.id===id&&x.name===nm&&x.price===pr); if(ex)ex.qty++; else o.items.push({packId,id,name:nm,price:pr,qty:1}); if(o.status==='ready'||o.status==='served')o.status='open'; render(); }
function composedTile(it){ const pk=it.ref.packId, di=it.ref.dishId, d=dishOf(pk,di); if(!d||it.hidden)return ''; const name=it.name||d.name, price=(it.price!=null?it.price:d.price), ph=dishPhoto(pk,di), av=liveAvail(pk,di), s=servingsAvail(pk,di);
  return `<a class="dtile${ph?' has-photo':''}"${av?` onclick="addToCartC('${pk}','${di}')"`:' style="opacity:.5;cursor:default"'}>${ph?`<img class="dtile-photo" src="${ph}" alt="" loading="lazy" onerror="var t=this.closest('.dtile');if(t)t.classList.remove('has-photo');this.remove()">`:''}${av?'<span class="dt-add">＋</span>':'<span class="dt-86">86</span>'}<div class="dt-in"><div class="dt-nm">${it.signature?'★ ':''}${esc(name)}${d.veg?' <span class="pill green">veg</span>':''}</div><div class="dt-pr">${fmt(price)}${(av&&s!==Infinity&&s<=5)?' · '+s+' left':''}</div></div></a>`; }
function myMenuCount(){ return MANIFEST.sections.reduce((n,sec)=>n+sec.items.filter(it=>!it.hidden).length,0); }
function pMyMenu(){ const head=pageHero('rest','Mi Menú',SVC+'service-menu.jpg', esc(MANIFEST.name)+' · prices incl. 13% VAT'); const has=MANIFEST.sections.some(sec=>sec.items.some(it=>!it.hidden))||liveSpecials().length>0;
  if(!has) return head+'<section class="container page">'+ticketBlock('rest')+'<p class="note">Your menu is empty. <a data-route="rest-compose">Build it →</a></p></section>';
  let body='<section class="container page">'+ticketBlock('rest')+'<div class="btnrow" style="margin-bottom:6px"><a class="btn sm" data-route="rest-compose">Edit menu</a></div>';
  body+=specialsSection();
  MANIFEST.sections.forEach(sec=>{ const vis=sec.items.filter(it=>!it.hidden); if(!vis.length)return; body+=`<div class="section-h" style="margin-top:26px">${esc(sec.name)}</div><div class="grid">${vis.map(composedTile).join('')}</div>`; });
  return head+body+'</section>'; }
function pCompose(){ let h=`<a class="back-link" data-route="">&larr; Restaurant</a><p class="eyebrow">Composer</p><h1 class="cat-title">Build your menu</h1><p class="cat-line">Pull dishes from any of the ${PACKS.length} menus into your own sections. Prices stay in colones, VAT-inclusive.</p>
    <div class="btnrow" style="margin:14px 0 6px;flex-wrap:wrap">${MENUS.map(m=>`<button class="btn sm${m.id===MANIFEST.id?' solid':''}" onclick="mfSwitchMenu('${m.id}')">${esc(m.name)}${m.start&&m.end?` <span style="opacity:.65">${m.start}–${m.end}</span>`:''}</button>`).join('')}<button class="btn sm" onclick="mfNewMenu()">＋ Menu</button></div>
    <div class="btnrow" style="margin:0 0 10px;flex-wrap:wrap"><button class="btn sm" onclick="mfDuplicateMenu()">Duplicate</button><button class="btn sm" onclick="mfSetDaypart()">Day-part…</button><button class="btn sm" onclick="toggleAutoByTime()">${autoByTime?'Auto-switch: ON':'Auto-switch: off'}</button><button class="btn sm" onclick="mfDeleteMenu()">Delete menu</button></div>
    <div class="kv" style="margin:14px 0 6px"><span class="k">Menu name</span><span class="v">${esc(MANIFEST.name)} <button class="btn sm" onclick="mfRenameMenu()">Rename</button></span></div>
    <div class="btnrow" style="margin-bottom:8px"><button class="btn solid sm" onclick="startCompose()">＋ Add dishes from library</button><button class="btn sm" onclick="mfNewSection()">＋ Section</button><button class="btn sm" onclick="mfAddHouse()">＋ House dish</button><button class="btn sm" onclick="mfAddRecipeLink()">↗ Recipe link</button><button class="btn sm" onclick="publishSpecial()">＋ Live special</button><a class="btn sm" data-route="rest-mymenu">Preview</a><button class="btn sm" onclick="mfExport()">Export JSON</button></div>`;
  h+=specialsManage();
  if(!MANIFEST.sections.length){ h+='<p class="note">No sections yet. Add a section, then add dishes from the library.</p>'; return h; }
  MANIFEST.sections.forEach((sec,si)=>{
    h+=`<div class="section"><div class="line" style="border-bottom:none;padding-bottom:4px"><div class="m"><div class="section-h" style="margin:0">${esc(sec.name)}${si===composeTarget?' <span class="pill green">target</span>':''}</div><div class="meta">${sec.items.length} item${sec.items.length===1?'':'s'}</div></div><button class="btn sm" onclick="mfSetTarget(${si})">Target</button><button class="btn sm" onclick="mfRenameSection(${si})">Rename</button><button class="btn sm" onclick="mfMoveSection(${si},-1)">&uarr;</button><button class="btn sm" onclick="mfMoveSection(${si},1)">&darr;</button><button class="btn sm" onclick="mfDelSection(${si})">&times;</button></div>`;
    h+='<div class="rows">'+sec.items.map((it,ii)=>{ const d=dishOf(it.ref.packId,it.ref.dishId); if(!d)return `<div class="line"><div class="m"><div class="nm" style="color:var(--brasa-accent)">Missing: ${esc(it.ref.packId)}:${esc(it.ref.dishId)}</div></div><button class="btn sm" onclick="mfRemove(${si},${ii})">Remove</button></div>`;
      const nm=it.name||d.name, pr=(it.price!=null?it.price:d.price);
      return `<div class="line"><div class="m"><div class="nm">${it.signature?'★ ':''}${esc(nm)}${d.veg?' <span class="pill green">veg</span>':''}${it.name?` <span class="meta" style="display:inline">(was ${esc(d.name)})</span>`:''}</div><div class="meta">${it.ref.packId==='house'?(d.source?'linked recipe':'house dish'):esc(it.ref.packId)+':'+esc(it.ref.dishId)}${it.price!=null?' · repriced':''}${d.source?` · <a href="${esc(d.source)}" target="_blank" rel="noopener">How to make it ↗</a>`:''}</div></div><span class="v">${fmt(pr)}</span><button class="btn sm" onclick="mfRename(${si},${ii})">Name</button><button class="btn sm" onclick="mfReprice(${si},${ii})">Price</button><button class="btn sm" onclick="mfSig(${si},${ii})">${it.signature?'Unstar':'Star'}</button><button class="btn sm" onclick="mfRemove(${si},${ii})">Remove</button></div>`;
    }).join('')+'</div></div>';
  });
  return h; }


/* =================== Phase 3: live specials (on-the-fly, time-boxed) ===================
   Specials live in the shared state (LIVE.specials), arrive over the socket, render
   as orderable tiles via dishOf('special',id), and auto-retire when their window ends. */
function liveSpecials(){ const t=Math.floor(Date.now()/1000); return (LIVE.specials||[]).filter(x=>!x.until||x.until>t); }
function specialLeft(until){ const m=Math.round((until-Date.now()/1000)/60); if(m<=0)return'ending'; if(m<60)return m+' min left'; return Math.floor(m/60)+'h left'; }
function specialTile(x){ const av=!LIVE.unavailable.has('special:'+x.id);
  return `<a class="dtile"${av?` onclick="addToCartC('special','${x.id}')"`:' style="opacity:.5;cursor:default"'}><span class="dt-special">Especial</span>${av?'<span class="dt-add">＋</span>':'<span class="dt-86">86</span>'}<div class="dt-in"><div class="dt-nm">${esc(x.name)}${x.veg?' <span class="pill green">veg</span>':''}</div><div class="dt-pr">${fmt(x.price)}${x.until?' · '+specialLeft(x.until):''}</div></div></a>`; }
function specialsSection(){ const sp=liveSpecials(); if(!sp.length)return''; return `<div class="section-h" style="margin-top:18px">Especiales</div><div class="grid">${sp.map(specialTile).join('')}</div>`; }
function specialsHome(){ const sp=liveSpecials(); if(!sp.length)return''; return `<p class="eyebrow" style="margin:36px 0 6px">Especiales de hoy</p><div class="grid">${sp.map(specialTile).join('')}</div>`; }
function specialsManage(){ const sp=liveSpecials(); if(!sp.length)return''; return `<div class="section"><div class="section-h">Live specials <span class="meta" style="font-weight:400">· live on every channel now</span></div>${sp.map(x=>`<div class="line"><div class="m"><div class="nm">${esc(x.name)}</div><div class="meta">${fmt(x.price)}${x.until?' · '+specialLeft(x.until):' · until retired'}</div></div><button class="btn sm" onclick="retireSpecialUI('${x.id}')">Retire</button></div>`).join('')}</div>`; }
async function publishSpecial(){ const name=prompt('Special name (e.g. "Ribeye especial"):'); if(!name)return; const pv=prompt('Price in colones (VAT-inclusive):','5000'); if(pv==null)return; const price=Math.max(0,Math.round(parseFloat(pv)||0)); if(!price){toast('Need a price');return;}
  const hv=prompt('Active for how many hours? (blank = until you retire it):',''); let until=null; const h=parseFloat(hv); if(h>0) until=Math.floor(Date.now()/1000)+Math.round(h*3600);
  const id='sp_'+Math.random().toString(36).slice(2,9);
  LIVE.specials=[...liveSpecials(), {id,name:name.trim(),price,cat:'Especiales',veg:false,until}]; render(); liveCommit();   // optimistic / local
  if(LIVE_API){ try{ const r=await fetch(`${LIVE_API}/v1/restaurant/${LIVE_REST}/special`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,name:name.trim(),price,until})}); if(r.ok){ const st=await r.json(); LIVE.specials=st.specials||[]; render(); } }catch(e){} }
  toast('Special published: '+name.trim()); }
async function retireSpecialUI(id){ LIVE.specials=liveSpecials().filter(x=>x.id!==id); render(); liveCommit();
  if(LIVE_API){ try{ const r=await fetch(`${LIVE_API}/v1/restaurant/${LIVE_REST}/special`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,retire:true})}); if(r.ok){ const st=await r.json(); LIVE.specials=st.specials||[]; render(); } }catch(e){} }
  toast('Special retired'); }


/* =================== Phase 4: multiple menus + day-parts ===================
   Several saved menus (lunch/dinner/holiday). The active one drives #rest-mymenu
   and is published to the live state so every channel knows which menu is on. */
function pushActiveMenu(){ if(LIVE)LIVE.menu=MANIFEST.id; liveCommit(); if(!LIVE_API)return; fetch(`${LIVE_API}/v1/restaurant/${LIVE_REST}/menu`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({menu:MANIFEST.id})}).catch(()=>{}); }
function mfNewMenu(){ const n=prompt('New menu name (e.g. Almuerzo, Cena):'); if(n==null)return; const m=newManifest(n); MENUS.push(m); MANIFEST=m; composeTarget=0; pushActiveMenu(); toast('Switched to '+m.name); render(); }
function mfSwitchMenu(id){ const m=MENUS.find(x=>x.id===id); if(!m||m===MANIFEST)return; MANIFEST=m; composeTarget=0; pushActiveMenu(); toast('Active menu: '+m.name); render(); }
function mfDuplicateMenu(){ const c=JSON.parse(JSON.stringify(MANIFEST)); c.id='m_'+Math.random().toString(36).slice(2,8); c.name=MANIFEST.name+' (copia)'; MENUS.push(c); MANIFEST=c; composeTarget=0; pushActiveMenu(); render(); toast('Duplicated'); }
function mfDeleteMenu(){ if(MENUS.length<=1){ toast('Keep at least one menu'); return; } if(!confirm('Delete menu "'+MANIFEST.name+'"?'))return; const id=MANIFEST.id; MENUS=MENUS.filter(x=>x.id!==id); MANIFEST=MENUS[0]; composeTarget=0; pushActiveMenu(); render(); }
function mfSetDaypart(){ const ok=v=>!v||/^\d{1,2}:\d{2}$/.test(v); const sv=prompt('Start time HH:MM (blank = always available):', MANIFEST.start||''); if(sv==null)return; const ev=prompt('End time HH:MM:', MANIFEST.end||''); if(ev==null)return; if(!ok(sv.trim())||!ok(ev.trim())){ toast('Use HH:MM'); return; } MANIFEST.start=sv.trim()||null; MANIFEST.end=ev.trim()||null; render(); }
function _mins(t){ const m=/^(\d{1,2}):(\d{2})$/.exec(t||''); return m?(+m[1])*60+(+m[2]):null; }
function inDaypart(m,now){ const a=_mins(m.start), b=_mins(m.end); if(a==null||b==null)return false; return a<=b ? (now>=a&&now<b) : (now>=a||now<b); }
function autoActivateByTime(){ if(!autoByTime)return; const d=new Date(), now=d.getHours()*60+d.getMinutes(); const m=MENUS.find(x=>inDaypart(x,now)); if(m&&m!==MANIFEST){ MANIFEST=m; composeTarget=0; pushActiveMenu(); render(); } }
function toggleAutoByTime(){ autoByTime=!autoByTime; if(autoByTime)autoActivateByTime(); render(); toast(autoByTime?'Auto-switch by time ON':'Auto-switch off'); }


/* =================== Back office: Stored Recipes + AllRecipes gather =================== */
function pStored(b){ const fams=FAMILIES.map(f=>`<a class="tile" data-route="rest-fam-${f.i}"><span class="tl">${esc(f.name)}</span><span class="sub">${f.packs.length} menu${f.packs.length>1?'s':''}</span></a>`).join(''); const td=PACKS.reduce((a,p)=>a+p.catalog.length,0);
  return head(b,'Stored Recipes',`Every dish BRASA already carries — ${PACKS.length} menus across ${FAMILIES.length} regions, ${td.toLocaleString()} recipes. Tap a region.`)+`<div class="grid">${fams}</div>`; }

const AR_CATS=["Air Fryer","Appetizers and Snacks","Apple Pie","Bagels","Banana Bread","Beef Stew","Biscuits","Bread","Breakfast","Burgers","Cakes","Casseroles","Chicken","Chili","Cookies","Curry","Desserts","Dumplings","Empanadas","Fish","Grilling","Lasagna","Meatballs","Pasta","Pizza","Pork","Rice","Salads","Sandwiches","Seafood","Soups","Steak","Stir Fry","Tacos","Tortillas","Vegetarian"];
let GATHERED=[];
function arUrl(q){ return 'https://www.allrecipes.com/search?q='+encodeURIComponent(q); }
function arSearch(){ const v=(($('arq')&&$('arq').value)||'').trim(); if(!v){ toast('Type a dish or ingredient'); return; } window.open(arUrl(v),'_blank','noopener'); }
function arGather(){ const url=prompt('Paste a recipe URL from AllRecipes (or anywhere):'); if(!url)return; let u=url.trim(); if(!/^https?:\/\//i.test(u))u='https://'+u; const title=prompt('Name this recipe:', titleFromUrl(u)); if(title==null)return; const nm=title.trim()||titleFromUrl(u); GATHERED.unshift({id:'g'+Date.now(),title:nm,source:u}); toast('Gathered: '+nm); render(); }
function arRemove(id){ GATHERED=GATHERED.filter(x=>x.id!==id); render(); }
function arToMenu(id){ const g=GATHERED.find(x=>x.id===id); if(!g)return; const pv=prompt('Price in colones (VAT-inclusive) for "'+g.title+'":','3500'); if(pv==null)return; const price=Math.max(0,Math.round(parseFloat(pv)||0)); if(!price){ toast('Need a price'); return; } const hid='h'+(++MANIFEST._hid); MANIFEST.houseItems.push({id:hid,name:g.title,price,cat:'Especiales',veg:false,source:g.source}); if(!MANIFEST.sections.length)mfAddSection('General'); const ti=Math.min(composeTarget,MANIFEST.sections.length-1); MANIFEST.sections[ti].items.push({ref:{packId:'house',dishId:hid}}); mfSave(); toast('Added to '+MANIFEST.name+': '+g.title); render(); }
function pAllRecipes(b){ const dir='https://www.allrecipes.com/recipes-a-z-6735880';
  const chips=AR_CATS.slice().sort().map(c=>`<a class="btn sm" href="${arUrl(c)}" target="_blank" rel="noopener">${esc(c)}</a>`).join('');
  const gath=GATHERED.length?`<div class="rows">${GATHERED.map(g=>`<div class="line"><div class="m"><div class="nm">${esc(g.title)}</div><div class="meta"><a href="${esc(g.source)}" target="_blank" rel="noopener">How to make it \u2197</a></div></div><button class="btn sm" onclick="arToMenu('${g.id}')">Add to menu</button><button class="btn sm" onclick="arRemove('${g.id}')">Remove</button></div>`).join('')}</div>`:'<p class="note">Nothing gathered yet. Browse AllRecipes, then \u201c\u2197 Gather a recipe\u201d to save its link here.</p>';
  return head(b,'AllRecipes','The world\u2019s biggest recipe directory \u2014 a mini cooking school. Browse it, gather what you want, and drop it onto a menu. The full method stays on AllRecipes; we link and credit.')+
   `<div class="ar-search"><input id="arq" type="text" placeholder="Find a recipe or ingredient\u2026" onkeydown="if(event.key==='Enter')arSearch()"><button class="btn solid sm" onclick="arSearch()">Search AllRecipes \u2197</button></div>
    <div class="btnrow" style="margin:10px 0 4px"><a class="btn sm" href="${dir}" target="_blank" rel="noopener">Open the A\u2013Z directory \u2197</a><button class="btn solid sm" onclick="arGather()">\u2197 Gather a recipe</button></div>
    <p class="eyebrow" style="margin:26px 0 10px">Gathered recipes</p>${gath}
    <p class="eyebrow" style="margin:26px 0 10px">Jump to a category</p><div class="btnrow" style="flex-wrap:wrap;gap:8px">${chips}</div>`; }

function defaultUseBy(g){ const days=g.perishable?6:365; return Date.now()+days*864e5; }
function fmtDay(t){ if(t==null)return ''; const d=new Date(t); return d.toLocaleDateString([],{month:'short',day:'numeric'}); }
function daysLeft(t){ return Math.round((t-Date.now())/864e5); }
function stockIn(g,qty,useBy){ if(!(qty>0))return; g.onHand+=qty; if(g.perishable){ (g.lots=g.lots||[]).push({q:qty,useBy:useBy||defaultUseBy(g)}); } }
function drawFEFO(g,amount){ if(!(amount>0))return; g.onHand=Math.max(0,g.onHand-amount); if(!g.lots||!g.lots.length)return; g.lots.sort((a,b)=>(a.useBy||Infinity)-(b.useBy||Infinity)); let need=amount; for(const l of g.lots){ if(need<=0)break; const take=Math.min(l.q,need); l.q-=take; need-=take; } g.lots=g.lots.filter(l=>l.q>0.0001); }
function logWaste(id,qty,reason,note){ const g=ingMap.get(id); if(!g||!(qty>0))return false; const w=Math.min(qty,g.onHand); drawFEFO(g,w); logMove('waste',g.name,-w,g.onHand,(reason||'Waste')+(note?' \u00b7 '+note:'')); reportAutoStock(); return true; }
function logWasteForm(){ const id=$('wIng')&&$('wIng').value; const qty=parseFloat($('wQty')&&$('wQty').value); const reason=($('wReason')&&$('wReason').value)||'Spoiled'; const note=($('wNote')&&$('wNote').value||'').trim(); const g=ingMap.get(id); if(!g){toast('Pick an item');return;} if(!(qty>0)){toast('Enter a quantity');return;} const w=Math.min(qty,g.onHand); if(logWaste(id,qty,reason,note)){ render(); toast('Wasted '+Math.round(w).toLocaleString()+' '+g.uom+' \u00b7 '+reason); } }
function expiredLots(){ const out=[]; ING.forEach(g=>{ (g.lots||[]).forEach(l=>{ if(l.useBy&&l.useBy<Date.now()&&l.q>0) out.push({g,l}); }); }); return out.sort((a,b)=>a.l.useBy-b.l.useBy); }
function expiringSoon(days){ const lim=Date.now()+(days||3)*864e5; const out=[]; ING.forEach(g=>{ (g.lots||[]).forEach(l=>{ if(l.useBy&&l.useBy>=Date.now()&&l.useBy<=lim&&l.q>0) out.push({g,l}); }); }); return out.sort((a,b)=>a.l.useBy-b.l.useBy); }
function writeOffExpired(id){ const g=ingMap.get(id); if(!g)return; let tot=0; (g.lots||[]).forEach(l=>{ if(l.useBy&&l.useBy<Date.now()) tot+=l.q; }); if(tot>0){ logWaste(id,tot,'Expired'); render(); toast('Wrote off '+Math.round(tot).toLocaleString()+' '+g.uom+' of '+g.name); } }
function writeOffAllExpired(){ const seen={}; expiredLots().forEach(({g})=>{ if(seen[g.id])return; seen[g.id]=1; let tot=0; (g.lots||[]).forEach(l=>{ if(l.useBy&&l.useBy<Date.now()) tot+=l.q; }); if(tot>0) logWaste(g.id,tot,'Expired'); }); render(); toast('Expired stock written off'); }
function pWaste(b){ const opts=ING.slice().sort((a,c)=>a.name.localeCompare(c.name)).map(g=>`<option value="${g.id}">${esc(g.name)} (${Math.round(g.onHand).toLocaleString()} ${g.uom})</option>`).join('');

      <p class="hj-sub">BRASA ID <b>${esc(JOIN.id)}</b><br>${JOIN.days} days free \u00b7 your $99/year service starts after.</p>
      <button class="hj-btn dark" onclick="joinActivate()">Start my service now</button>
      <p id="bj-err" class="hj-err">${JOIN.err||''}</p>
    </div>`;
  }
  if(JOIN.step===3){
    return `<div class="hero-join">
      <p class="hj-eyebrow">Pay by SINPE M\u00f3vil</p>
      <p class="hj-amt">\u20a1 ${JOIN.monto}</p>
      <p class="hj-sub">Destination <b>${esc(JOIN.destino)}</b><br>Reference <b>${esc(JOIN.ref)}</b><br>BRASA ID <b>${esc(JOIN.id)}</b></p>
    </div>`;
  }
  return `<div class="hero-join">
    <h2 class="hj-title">Business — $99/year</h2>
    <input id="bj-name" class="hj-in" type="text" placeholder="Full Name">
    <input id="bj-phone" class="hj-in" type="tel" inputmode="tel" placeholder="Phone Number">
    <input id="bj-dob" class="hj-in" type="text" placeholder="Date of Birth" onfocus="this.type='date'" onblur="if(!this.value)this.type='text'">
    <button class="hj-btn" onclick="joinStart()">Start my 14-day free trial</button>
    <p id="bj-err" class="hj-err"></p>
  </div>`;
}
async function joinStart(){
  const name=($('bj-name').value||'').trim(), phone=($('bj-phone').value||'').trim(), dob=($('bj-dob').value||'').trim();
  const err=$('bj-err');
  if(!name||!phone||!dob){ err.textContent='Please fill in name, phone and date of birth.'; return; }
  err.textContent='Starting\u2026';
  try{
    const r=await fetch(BRASA_JOIN_API+'/trial/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,phone,dob})});
    const d=await r.json(); if(!r.ok) throw new Error(d.error||'Could not start.');
    JOIN={step:2,id:d.display_id,days:d.days_left}; render();
  }catch(e){ err.textContent=String(e.message||e); }
}
async function joinActivate(){
  const err=$('bj-err'); if(err) err.textContent='\u2026';
  try{
    const r=await fetch(BRASA_JOIN_API+'/trial/activate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:JOIN.id,code:JOIN_CODE})});
    const d=await r.json();
    if(!r.ok){ JOIN.err=d.note||d.error||'Not available yet.'; render(); return; }
    JOIN={step:3,id:JOIN.id,monto:Number(d.crc_amount).toLocaleString('es-CR'),destino:d.instruction.to_sinpe,ref:d.instruction.reference}; render();
  }catch(e){ if(err) err.textContent=String(e.message||e); }
}
/* ================================================================= */
function render(){ const slug=decodeURIComponent(location.hash.slice(1)); let html=null;
  if(slug && PAGES[slug]) html=PAGES[slug]();
  else if(slug.startsWith('rest-fam-')) html=pFam(slug.slice(9));
  else if(slug.startsWith('rest-pack-')) html=pPack(slug.slice(10));
  else if(slug.startsWith('rest-pcat-')){ const r=slug.slice(10).split('~'); html=pPackCat(r[0],r[1]); }
  else if(slug.startsWith('rest-order-')) html=pOrder(slug.slice(11));
  const heroPage = html && html.startsWith('<div class="hero"');
  $('view').innerHTML = html ? (heroPage ? (html.indexOf('<!--HC-->')>=0 ? html.replace('<!--HC-->','<section class="container page">')+'</section>' : html) : `<section class="container page">${html}</section>`) : home();
  const hasHero = !html || heroPage;
  document.body.classList.toggle('hero-mode', hasHero);
  if(!hasHero) document.body.classList.remove('scrolled');
  composeBar();
  heroScroll();
  if(!slug || hasHero) window.scrollTo(0,0); }
function heroScroll(){ if(!document.body.classList.contains('hero-mode')) return; const h=document.querySelector('.hero'), hd=document.querySelector('.site-header'); const hh=h?h.offsetHeight:420, sh=hd?hd.offsetHeight:62; document.body.classList.toggle('scrolled', window.scrollY>(hh-sh-4)); }
window.addEventListener('scroll',heroScroll,{passive:true});
window.addEventListener('resize',heroScroll);
document.addEventListener('click',e=>{ const a=e.target.closest('[data-route]'); if(!a)return;
  e.preventDefault(); const r=a.getAttribute('data-route'); if(r){location.hash='#'+r;} else {history.replaceState(null,'',location.pathname);render();window.scrollTo(0,0);} });
window.addEventListener('hashchange',render);
liveStart();                                     // restore last session + join the same-origin live channel (no backend needed)
render();
liveSync(); liveConnect();                       // server snapshot + instant push (only active when LIVE_API is set)
if(LIVE_API){ setInterval(()=>{ if(!LIVE_WS||LIVE_WS.readyState!==1){ liveConnect(); liveSync(); } }, 10000); }  // reconnect + fallback poll
setInterval(()=>{ if((LIVE.specials||[]).length){ const live=liveSpecials(); if(live.length!==LIVE.specials.length)LIVE.specials=live; render(); } }, 30000);  // auto-retire expired specials + refresh countdowns
autoActivateByTime(); setInterval(autoActivateByTime, 60000);  // day-part auto-switch

</script>
